<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;padding:16px;padding-bottom:calc(80px + env(safe-area-inset-bottom));line-height:1.6}
.container{max-width:720px;margin:0 auto}
h1{font-size:22px;text-align:center;margin-bottom:4px;color:#f1f5f9}
.sub{text-align:center;color:#94a3b8;font-size:13px;margin-bottom:20px}
.progress{background:#1e293b;border-radius:8px;height:10px;margin-bottom:8px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:8px;transition:width 0.4s}
.score{text-align:center;font-size:13px;color:#94a3b8;margin-bottom:16px}
.tabs{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
.tab{padding:6px 10px;font-size:11px;border:1px solid #334155;border-radius:6px;background:#1e293b;color:#94a3b8;cursor:pointer;transition:all 0.15s}
.tab:hover{border-color:#6366f1;color:#c7d2fe}
.tab.act{border-color:#6366f1;background:#6366f1;color:#fff;font-weight:600}
.tab.done{border-color:#10b981;color:#10b981}
.stitle{font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #334155}
.ttoggle{cursor:pointer;color:#818cf8;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;padding:12px 16px;background:#1e293b;border:1px solid #334155;border-radius:12px 12px 0 0;transition:all 0.2s;user-select:none}
.ttoggle:hover{background:#252f45;border-color:#6366f1}
.ttoggle.closed{border-radius:12px}
.tbox{background:#1e293b;border:1px solid #334155;border-top:none;border-radius:0 0 12px 12px;padding:20px 24px;font-size:14px;line-height:1.9;overflow:hidden;transition:max-height 0.3s ease}
.tbox.hide{max-height:0;padding:0 24px;border:none}
.tt{color:#a5b4fc;font-weight:700;font-size:15px;margin:16px 0 6px;display:block}
.tt:first-child{margin-top:0}
.tf{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 16px;margin:8px 0;font-family:Consolas,'SF Mono',monospace;font-size:15px;color:#c4b5fd;letter-spacing:0.3px;overflow-x:auto}
.tex{background:#0c1a0c;border:1px solid #166534;border-radius:8px;padding:12px 16px;margin:10px 0;color:#86efac;font-size:13px;white-space:pre-wrap;line-height:1.7}
.tex::before{content:'ПРИМЕР';display:block;color:#4ade80;font-weight:700;font-size:11px;letter-spacing:1px;margin-bottom:6px}
.th{background:#1a1a0c;border:1px solid #854d0e;border-radius:8px;padding:10px 14px;margin:10px 0;color:#fcd34d;font-size:13px}
.th::before{content:'ЗАПОМНИ';display:block;color:#fbbf24;font-weight:700;font-size:11px;letter-spacing:1px;margin-bottom:4px}
.guide{background:#111827;border:1px solid #334155;border-radius:12px;padding:16px 18px;margin:18px 0 8px}
.guide::before{content:'КАК РЕШАТЬ';display:block;color:#93c5fd;font-weight:700;font-size:11px;letter-spacing:1px;margin-bottom:8px}
.gtitle{color:#f8fafc;font-weight:700;font-size:14px;margin:12px 0 6px}
.gtitle:first-child{margin-top:0}
.guide ul,.expl ul{margin:6px 0 6px 18px}
.guide li,.expl li{margin-bottom:4px}
.gtrap{background:#221815;border:1px solid #7c2d12;border-radius:8px;padding:10px 12px;margin-top:10px;color:#fdba74;font-size:13px}
.gtrap::before{content:'ЛОВУШКА';display:block;color:#fb923c;font-weight:700;font-size:11px;letter-spacing:1px;margin-bottom:4px}
.tbox ul{margin:6px 0 6px 20px;color:#cbd5e1}
.tbox li{margin-bottom:4px}
.qbox{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:12px}
.qnum{font-size:11px;color:#64748b;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.qtxt{font-size:16px;font-weight:600;margin-bottom:16px;color:#f1f5f9;line-height:1.5}
.opt{display:block;width:100%;padding:15px 16px;margin-bottom:10px;border:2px solid #334155;border-radius:10px;background:#0f172a;color:#e2e8f0;cursor:pointer;font-size:15px;text-align:left;transition:all 0.2s}
.opt:hover{border-color:#6366f1;background:#1e1b4b}
.opt.ok{border-color:#10b981;background:#064e3b;color:#6ee7b7;cursor:default}
.opt.no{border-color:#ef4444;background:#450a0a;color:#fca5a5;cursor:default}

.opt.dis.ok{opacity:1}
.expl{margin-top:12px;padding:12px 16px;background:#1a1a2e;border-left:3px solid #6366f1;border-radius:0 8px 8px 0;font-size:13px;color:#c7d2fe;display:none;line-height:1.7}
.expl.show{display:block}
.nav{display:flex;gap:8px;justify-content:center;margin:20px 0;flex-wrap:wrap}
.btn{padding:10px 20px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;cursor:pointer;font-size:13px;transition:all 0.15s}
.btn:hover{background:#334155}
.btn.pri{background:#6366f1;border-color:#6366f1}
.btn.pri:hover{background:#4f46e5}

/* === trainer 3.0 === */
.modes{position:fixed;bottom:0;left:0;right:0;display:flex;background:#0a1120;border-top:1px solid #1e293b;padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:100}
.mbtn{flex:1;padding:6px 2px;border-radius:6px;border:none;background:transparent;color:#475569;cursor:pointer;font-size:9px;font-weight:600;transition:color .15s;display:flex;flex-direction:column;align-items:center;gap:2px}
.mbtn .mico{font-size:22px;line-height:1}
.mbtn:hover{color:#c7d2fe}
.mbtn.act{color:#818cf8}
.chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.chip{padding:6px 10px;font-size:11px;border:1px solid #334155;border-radius:6px;background:#1e293b;color:#94a3b8;cursor:pointer;transition:all .15s}
.chip:hover{border-color:#6366f1;color:#c7d2fe}
.chip.act{border-color:#6366f1;background:#6366f1;color:#fff;font-weight:600}
.tcard{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:12px}
.ttag{font-size:11px;color:#818cf8;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.tq{font-size:17px;font-weight:600;color:#f1f5f9;line-height:1.5;margin-bottom:14px}
.arow{display:flex;gap:8px}
.ain{flex:1;padding:12px 14px;border-radius:8px;border:2px solid #334155;background:#0f172a;color:#e2e8f0;font-size:16px;min-width:0}
.ain:focus{outline:none;border-color:#6366f1}
.vrd{margin-top:12px;padding:12px 14px;border-radius:8px;font-size:14px;line-height:1.7}
.vrd.ok{background:#064e3b;border:1px solid #10b981;color:#a7f3d0}
.vrd.no{background:#450a0a;border:1px solid #ef4444;color:#fecaca}
.sline{display:flex;justify-content:space-between;font-size:13px;color:#94a3b8;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.timer{font-size:38px;font-weight:800;text-align:center;font-variant-numeric:tabular-nums;margin:4px 0 10px;color:#f1f5f9}
.timer.low{color:#f87171}
.srow{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
.sbarw{flex:1;background:#0f172a;height:8px;border-radius:4px;overflow:hidden}
.sbar{height:100%;border-radius:4px}

/* explanation framework */
.fw{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.fwi{padding:9px 12px;border-radius:8px;font-size:13px;line-height:1.65;color:#e2e8f0}
.fw-int{background:rgba(99,102,241,.13);border-left:3px solid #6366f1}
.fw-tec{background:rgba(16,185,129,.11);border-left:3px solid #10b981}
.fw-con{background:rgba(168,85,247,.11);border-left:3px solid #a855f7}
.fw-trp{background:rgba(245,158,11,.11);border-left:3px solid #f59e0b}
.fwi b{color:#f1f5f9}
.expl details summary{outline:none}
.expl details summary::-webkit-details-marker{color:#818cf8}

/* === solution card (v4) === */
.sol{display:flex;flex-direction:column;gap:10px}
.sol-ans{font-size:14px;color:#f1f5f9}
.sol-ans b{color:#6ee7b7}
.sol-given{font-size:12.5px;color:#94a3b8;background:rgba(148,163,184,.08);border-radius:8px;padding:8px 11px;line-height:1.55}
.sol-given b{color:#cbd5e1}
.sol-steps{list-style:none;margin:0;padding:0;counter-reset:st;display:flex;flex-direction:column;gap:9px}
.sol-step{position:relative;padding:9px 12px 9px 38px;background:#0f172a;border:1px solid #1e293b;border-radius:9px;line-height:1.6}
.sol-step::before{counter-increment:st;content:counter(st);position:absolute;left:9px;top:9px;width:20px;height:20px;border-radius:50%;background:#6366f1;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.sol-think{font-size:13px;color:#e2e8f0}
.sol-calc{font-size:13px;color:#a5b4fc;font-family:'SF Mono',ui-monospace,Menlo,monospace;margin-top:3px}
.sol-anchor{font-size:12px;color:#fcd34d;margin-top:4px}
.sol-anchor::before{content:"\2693 ";}
.sol-check{font-size:12.5px;color:#6ee7b7;background:rgba(16,185,129,.09);border-left:3px solid #10b981;border-radius:0 8px 8px 0;padding:7px 11px;line-height:1.55}
.sol-check::before{content:"\2713 \041F\0440\043E\0432\0435\0440\043A\0430: ";font-weight:700}
.sol-traps{margin-top:2px}
.sol-traps summary{cursor:pointer;color:#fca5a5;font-size:12.5px;font-weight:600;outline:none}
.sol-traps summary::-webkit-details-marker{color:#f87171}
.sol-traps ul{margin:7px 0 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:6px}
.sol-traps li{font-size:12.5px;color:#fecaca;background:rgba(239,68,68,.07);border-radius:7px;padding:6px 10px;line-height:1.5}
.sol-traps li b{color:#fca5a5}
.sol-deep{margin-top:4px}
.sol-deep>summary{cursor:pointer;color:#818cf8;font-size:12.5px;font-weight:600;outline:none;list-style:none}
.sol-deep>summary::-webkit-details-marker{display:none}
.sol-deep>summary::before{content:"\25B8 ";transition:transform .2s}
.sol-deep[open]>summary::before{content:"\25BE ";}

/* === glossary term chips === */
.gt{border-bottom:1px dashed #6366f1;cursor:pointer;color:#c7d2fe;font-weight:600;white-space:nowrap}
.gt:active{color:#fff}
.gpop{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:520px;z-index:300;background:#0f172a;border:1px solid #334155;border-top:3px solid #6366f1;border-radius:16px 16px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -12px 40px rgba(0,0,0,.55);animation:gpop-up .22s ease}
@keyframes gpop-up{from{transform:translate(-50%,100%)}to{transform:translate(-50%,0)}}
.gpop-bd{position:fixed;inset:0;background:rgba(2,6,23,.6);z-index:299}
.gpop h4{margin:0 0 2px;font-size:18px;color:#f1f5f9}
.gpop .gpop-full{font-size:12px;color:#818cf8;letter-spacing:.3px;margin-bottom:10px}
.gpop .gpop-one{font-size:14px;color:#e2e8f0;line-height:1.6;margin-bottom:10px}
.gpop .gpop-f{font-size:13px;color:#a5b4fc;font-family:'SF Mono',ui-monospace,Menlo,monospace;background:#1a1a2e;border-radius:8px;padding:9px 12px;line-height:1.5;margin-bottom:10px}
.gpop .gpop-x{display:block;width:100%;padding:11px;border-radius:9px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:14px;font-weight:600;cursor:pointer}

/* cheat sheet */
.cheat-intro{font-size:13px;color:#94a3b8;line-height:1.6;background:#1e293b;border:1px solid #334155;border-left:3px solid #6366f1;border-radius:8px;padding:12px 14px;margin-bottom:18px}
.bench-grp{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#818cf8;margin:16px 0 2px;font-weight:700}
.brow{padding:8px 0;border-bottom:1px solid #1e293b}
.brow-top{display:flex;justify-content:space-between;gap:12px;align-items:baseline}
.brow-m{color:#e2e8f0;font-weight:600;font-size:13px}
.brow-n{color:#6ee7b7;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;font-size:13px;text-align:right}
.brow-c{color:#64748b;font-size:11.5px;line-height:1.45;margin-top:3px}
.brow-c b{color:#94a3b8}
.cheat-h{font-size:15px;font-weight:700;color:#f1f5f9;margin:22px 0 10px;display:flex;align-items:center;gap:8px}
.ctab{width:100%;border-collapse:collapse;font-size:13px;background:#1e293b;border:1px solid #334155;border-radius:10px;overflow:hidden}
.ctab td{padding:8px 12px;border-bottom:1px solid #0f172a}
.ctab tr:last-child td{border-bottom:none}
.ctab td:first-child{color:#cbd5e1}
.ctab td:last-child{color:#c4b5fd;font-family:Consolas,'SF Mono',monospace;text-align:right;white-space:nowrap}
.fx{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:9px 12px;margin-bottom:7px;font-size:13px;line-height:1.5}
.fx b{color:#a5b4fc}
.fx code{color:#86efac;font-family:Consolas,'SF Mono',monospace;font-size:12.5px}
.spine{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.spine-t{font-weight:700;color:#a5b4fc;margin-bottom:4px;font-size:14px}
.spine-d{font-size:12px;color:#64748b;margin-bottom:12px;line-height:1.5}
.chain{display:flex;flex-wrap:wrap;align-items:center;gap:6px}
.node{background:#0f172a;border:1px solid #475569;border-radius:8px;padding:6px 10px;font-size:12px;color:#e2e8f0;line-height:1.35}
.node b{color:#c4b5fd}
.arr{color:#6366f1;font-weight:800;font-size:14px}

/* install banner */
#installbanner{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#cbd5e1;display:flex;align-items:flex-start;gap:12px}
#installbanner .ibx{flex:1}
#installbanner strong{display:block;color:#f1f5f9;margin-bottom:2px}
#installbanner button{background:none;border:none;color:#475569;font-size:20px;cursor:pointer;padding:0;line-height:1;flex-shrink:0}

/* answer animations */
@keyframes vrd-ok{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes vrd-no{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.vrd.ok{animation:vrd-ok .25s ease both}
.vrd.no{animation:vrd-no .4s ease both}

/* confetti */
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden}
.cp{position:absolute;width:8px;height:8px;border-radius:2px;animation:cpfall linear forwards}
@keyframes cpfall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>

<script>
var S=[{"id": "annuity", "title": "1. Аннуитетный платёж", "theory_blocks": [{"type": "title", "text": "Что это"}, {"type": "text", "text": "Равный ежемесячный платёж по кредиту, включающий и тело долга, и проценты."}, {"type": "title", "text": "Формула"}, {"type": "formula", "text": "PMT = P * r*(1+r)^n / ((1+r)^n - 1)"}, {"type": "list", "items": ["P -- сумма займа", "r -- месячная ставка (годовая / 12)", "n -- количество месяцев"]}, {"type": "title", "text": "Пример"}, {"type": "example", "text": "Займ 1.2 млн руб., 12% годовых, 12 мес.\nr = 12%/12 = 1% = 0.01\n(1.01)^12 = 1.1268\nPMT = 1,200,000 * 0.01268 / 0.1268 = ~106,600 руб./мес"}, {"type": "title", "text": "Обратный аннуитет (PV)"}, {"type": "text", "text": "Если знаем платежи -- находим сумму кредита:"}, {"type": "formula", "text": "PV = PMT * AF (Annuity Factor)"}, {"type": "title", "text": "Дифференцированный платёж"}, {"type": "text", "text": "Тело долга фиксировано (ОД/n), проценты пересчитываются каждый месяц от остатка. Переплата меньше, но первые платежи выше."}], "questions": [{"q": "Займ 600K руб., 24% годовых, 6 мес. Месячная ставка r = ?", "options": ["1%", "2%", "4%", "24%"], "correct": 1, "explanation": "24% / 12 = 2% в месяц"}, {"q": "При аннуитете 50K руб./мес и AF = 5.0, какова PV?", "options": ["100,000", "250,000", "500,000", "10,000"], "correct": 1, "explanation": "PV = PMT * AF = 50,000 * 5.0 = 250,000"}, {"q": "Аннуитет vs дифференцированный: где переплата МЕНЬШЕ?", "options": ["Аннуитет", "Дифференцированный", "Одинаково", "Зависит от ставки"], "correct": 1, "explanation": "При дифф. платежах тело гасится быстрее -- меньше процентов"}, {"q": "Займ 2.4 млн, 18% год., 24 мес. r=1.5%. (1.015)^24=1.43. PMT?", "options": ["~80,000", "~100,000", "~120,000", "~140,000"], "correct": 2, "explanation": "PMT = 2.4M * 0.015*1.43/(1.43-1) = 2.4M * 0.0499 = ~120K"}]}, {"id": "irr", "title": "2. IRR / XIRR", "theory_blocks": [{"type": "title", "text": "IRR -- ставка, при которой NPV = 0"}, {"type": "text", "text": "Показывает реальную доходность инвестиции. Номинальная ставка кредита != реальная доходность."}, {"type": "title", "text": "Почему IRR > номинальной ставки"}, {"type": "list", "items": ["Комиссия при выдаче -- банк получает деньги сразу", "Аннуитет -- тело гасится постепенно, проценты на полную сумму", "Ранние платежи 'весят' больше (временная стоимость денег)"]}, {"type": "title", "text": "Пример: BNPL Ozon"}, {"type": "example", "text": "Товар 10,000 руб., переплата 1,800 (18%). 6 платежей за 6 мес.\nМесячная IRR подбором: ~4.66%\nВ годовых: (1.0466)^12 = 71% (!!!)"}, {"type": "hint", "text": "Номинально 18%, реально 71% -- потому что деньги возвращаются по частям, каждый платёж 'реинвестируется'."}, {"type": "title", "text": "Линейная интерполяция"}, {"type": "example", "text": "При 3.5% NPV = +365, при 4.5% NPV = +51\nDr = 51/(365-51) * 1% -- нет, правильно:\nDr = 51/314 = 0.16%. IRR = 4.5 + 0.16 = 4.66%"}], "questions": [{"q": "Займ 100K с комиссией 3% и ставкой 20%/год на 6 мес. IRR будет:", "options": ["= 20%", "> 20%", "< 20%", "= 23%"], "correct": 1, "explanation": "Комиссия + быстрый возврат тела -- IRR всегда ВЫШЕ номинальной"}, {"q": "BNPL: товар 20K, переплата 2,200 за 6 недель. IRR в годовых?", "options": ["11%", "30%", "60-80%", "200%+"], "correct": 3, "explanation": "Переплата 11% за 6 недель — но возврат ЕЖЕНЕДЕЛЬНЫЙ. Недельная IRR ~3% → (1.03)^52 ≈ +370% годовых. Короткие рассрочки усурьёзны в годовом выражении."}, {"q": "При 3% NPV=+500, при 5% NPV=-100. IRR?", "options": ["3.5%", "4%", "4.7%", "5%"], "correct": 2, "explanation": "Интерполяция: 3% + 2%*500/(500+100) = 3%+1.67% = 4.67%"}, {"q": "Банк выдал 100K, получил 24 еженедельных платежа по 5K (итого 120K за 6 мес). XIRR будет:", "options": ["= 40%", "> 40%", "< 40%", "Нельзя определить"], "correct": 1, "explanation": "Платежи приходят раньше (еженедельно) -- XIRR > простой ставки"}]}, {"id": "pv", "title": "3. PV, Перпетуитет", "theory_blocks": [{"type": "title", "text": "Present Value"}, {"type": "formula", "text": "PV = FV / (1+r)^n"}, {"type": "text", "text": "Деньги завтра стоят меньше, чем сегодня. r = 'что ещё я мог бы сделать с деньгами'."}, {"type": "title", "text": "Перпетуитет (бесконечный поток)"}, {"type": "formula", "text": "PV = CF / r"}, {"type": "example", "text": "Продукт приносит 500K/год, r = 12%\nPV = 500K / 0.12 = 4.17 млн"}, {"type": "title", "text": "Растущий перпетуитет"}, {"type": "formula", "text": "PV = CF1 / (r - g)"}, {"type": "example", "text": "500K/год, рост 5%, r = 12%\nPV = 500K / 0.07 = 7.14 млн"}, {"type": "hint", "text": "g ВСЕГДА < r, иначе формула не работает."}, {"type": "title", "text": "Annuity Factor (AF)"}, {"type": "formula", "text": "AF = (1 - (1+r)^(-n)) / r"}, {"type": "text", "text": "AF(10%, 5 лет) = 3.79. Получить 1 руб/год 5 лет = 3.79 руб сегодня."}], "questions": [{"q": "Бизнес генерирует 1 млн/год бесконечно. r=20%. Стоимость?", "options": ["5 млн", "20 млн", "1 млн", "10 млн"], "correct": 0, "explanation": "PV = 1,000,000 / 0.20 = 5,000,000"}, {"q": "Тот же, но CF растёт на 5%/год. r=20%. PV=?", "options": ["5 млн", "6.67 млн", "7.14 млн", "20 млн"], "correct": 1, "explanation": "PV = 1M / (0.20-0.05) = 1M / 0.15 = 6.67M"}, {"q": "AF(12%,5)=3.60. Инвестиция 80 млн, экономия 25 млн/год. NPV=?", "options": ["+10 млн", "-10 млн", "+90 млн", "0"], "correct": 0, "explanation": "NPV = -80 + 25*3.60 = -80+90 = +10 млн"}, {"q": "Ключевая ставка: 20% -> 10%. Как изменится PV перпетуитета CF=100?", "options": ["x2 (удвоится)", "x0.5 (упадёт)", "Не изменится", "+10%"], "correct": 0, "explanation": "100/0.20=500 -> 100/0.10=1000. Удвоилась!"}]}, {"id": "pricing", "title": "4. Ценообразование", "theory_blocks": [{"type": "title", "text": "Формула цены кредита"}, {"type": "formula", "text": "Ставка = COF + EL + OpEx + Capital Charge + Margin"}, {"type": "list", "items": ["COF (Cost of Funding) -- стоимость привлечения (ключевая + премия)", "EL = PD * LGD -- ожидаемые потери", "OpEx -- операционные расходы", "Capital Charge = RWA% * ROC (напр. 12% * 10% = 1.2%)"]}, {"type": "example", "text": "COF 5% + EL 1.4% + Capital 1.2% = 7.6% минимальная ставка"}, {"type": "title", "text": "Risk-adjusted pricing"}, {"type": "example", "text": "PD=5%, LGD=100%, target 10%:\n95 платящих покрывают 110.\n95*(1+r) = 110 -> r = 15/95 = 15.8%"}, {"type": "title", "text": "Комиссия vs ставка"}, {"type": "example", "text": "Оффер А: 10% без комиссии -> эффективная 10%\nОффер Б: 8% + 2% комиссия -> получил 980K, вернул 1,080K\nЭффективная: 100K/980K = 10.2%"}], "questions": [{"q": "COF=8%, PD=3%, LGD=50%, OpEx=1%, Target=2%. Ставка?", "options": ["11.5%", "12.5%", "14%", "8%"], "correct": 1, "explanation": "EL=3%*50%=1.5%. Ставка=8+1.5+1+2=12.5%"}, {"q": "PD=10%, LGD=100%, target return 15%. Ставка?", "options": ["15%", "25%", "27.8%", "10%"], "correct": 2, "explanation": "90*(1+r)=115 -> r=25/90=27.8%"}, {"q": "Кредит 500K, ставка 12%, комиссия 3% удержана. Клиент получил:", "options": ["500,000", "485,000", "515,000", "440,000"], "correct": 1, "explanation": "500K - 3%*500K = 500K-15K = 485,000"}, {"q": "Ключевая ставка: 12% -> 21%. Влияние на COF банка?", "options": ["Не влияет", "COF растёт -> кредиты дорожают", "COF падает", "Только депозиты"], "correct": 1, "explanation": "COF привязан к ключевой. Рост -> дороже кредиты."}]}, {"id": "ear", "title": "5. EAR и сложный %", "theory_blocks": [{"type": "title", "text": "EAR (Effective Annual Rate)"}, {"type": "formula", "text": "EAR = (1 + r/m)^m - 1"}, {"type": "list", "items": ["r = номинальная ставка", "m = число капитализаций в год"]}, {"type": "example", "text": "Депозит 20% годовых, капитализация ежемесячно:\nEAR = (1+0.20/12)^12 - 1 = 21.94%"}, {"type": "title", "text": "Аннуализация короткой ставки"}, {"type": "example", "text": "Заработал 3% за 60 дней:\nПростой: 3% * 365/60 = 18.25%\nСложный: (1.03)^(365/60) - 1 = 19.7%"}, {"type": "hint", "text": "Чем чаще капитализация -> тем выше EAR. Ежегодно: 20%. Ежемесячно: 21.94%. Ежедневно: 22.13%."}], "questions": [{"q": "24% номинальная, ежемесячная капитализация. EAR?", "options": ["24%", "26.8%", "28%", "22%"], "correct": 1, "explanation": "(1+0.24/12)^12 -1 = (1.02)^12 -1 = 26.8%"}, {"q": "Доходность 5% за 90 дней. Аннуализировать сложным %:", "options": ["20%", "21.6%", "5%", "15%"], "correct": 1, "explanation": "(1.05)^(365/90) -1 = (1.05)^4.06 -1 = 21.6%"}, {"q": "1 млн, 18% с ежемесячной капитализацией, 3 года. Итого?", "options": ["1.54 млн", "1.7 млн", "1.4 млн", "2.0 млн"], "correct": 1, "explanation": "(1.015)^36 = 1.709. 1M * 1.709 = 1.7 млн"}]}, {"id": "funding", "title": "6. Стоимость фондирования", "theory_blocks": [{"type": "title", "text": "Эффективная дюрация"}, {"type": "text", "text": "Сколько дней деньги реально были у заёмщика (с учётом частичных погашений). Займ 180 дней с еженедельным погашением -> эфф. дюрация ~90 дней."}, {"type": "title", "text": "Револьверная кредитная линия"}, {"type": "example", "text": "Лимит 100, drawn 25, undrawn 75.\nInterest на drawn: 4.5% * 25 = 1.125\nCommitment fee на undrawn: 1.5% * 75 = 1.125\nИтого: 2.25. Эффективная: 2.25/25 = 9% (не 4.5%!)"}, {"type": "title", "text": "Факторинг"}, {"type": "example", "text": "Счёт 10K, получил 9,700, через 60 дней фактор получит 10K.\n300/9,700 = 3.09% за 60 дней.\nВ годовых: (1.0309)^(365/60) = 20.4%"}, {"type": "title", "text": "Trade credit '2/10 net 30'"}, {"type": "example", "text": "Скидка 2% при оплате за 10 дней, иначе полная за 30.\nОтказ от скидки = 2%/98% за 20 дней = 2.04%.\nВ годовых: 2.04% * 365/20 = 37% -- очень дорого!"}], "questions": [{"q": "Револьвер: лимит 200, drawn 50, undrawn 150. Interest 5%, fee 2%. Эфф. ставка?", "options": ["5%", "7%", "11%", "2%"], "correct": 2, "explanation": "50*5%+150*2%=2.5+3=5.5. 5.5/50=11%"}, {"q": "Факторинг: счёт 50K, аванс 48K, через 30 дней 50K. Годовая ставка (простой %)?", "options": ["4.2%", "25%", "50.7%", "48%"], "correct": 2, "explanation": "2K/48K=4.17% за 30 дней. 4.17%*365/30=50.7%"}, {"q": "Займ 1M на 180 дней, еженедельное погашение. Эфф. дюрация?", "options": ["180 дней", "~90 дней", "~45 дней", "24 дня"], "correct": 1, "explanation": "Равномерное погашение -> средний остаток 50% -> эфф. дюрация ~90 дней"}]}, {"id": "npv", "title": "7. NPV и Break-Even", "theory_blocks": [{"type": "formula", "text": "NPV = -Investment + CF * AF"}, {"type": "hint", "text": "Год 0 НЕ дисконтируется!"}, {"type": "title", "text": "Break-Even по CF"}, {"type": "formula", "text": "CF_BE = Investment / AF"}, {"type": "title", "text": "Break-Even по Investment"}, {"type": "formula", "text": "Inv_BE = CF * AF"}, {"type": "title", "text": "Safety Margin"}, {"type": "formula", "text": "SM = (Plan - BE) / Plan * 100%"}, {"type": "title", "text": "IRR проекта"}, {"type": "text", "text": "Ставка, при которой NPV=0. AF(IRR)=Investment/CF, подбираем."}, {"type": "example", "text": "Инвестиция 60M, экономия 20M/год, 5 лет, r=10%.\nAF=3.79. NPV=-60+20*3.79=+15.8M\nBE: 60/3.79=15.8M/год. SM: (20-15.8)/20=21%\nIRR: AF=60/20=3.0 -> r~20%"}], "questions": [{"q": "Инвестиция 100M, экономия 30M/год (1-5), r=12%, AF=3.60. NPV?", "options": ["+8M", "-8M", "+30M", "0"], "correct": 0, "explanation": "-100+30*3.60=-100+108=+8M"}, {"q": "Из предыдущей: break-even по экономии?", "options": ["30M", "27.8M", "36M", "100M"], "correct": 1, "explanation": "CF_BE=100/3.60=27.8M/год"}, {"q": "NPV=+8M при r=12%. IRR будет:", "options": ["=12%", ">12%", "<12%", "=8%"], "correct": 1, "explanation": "NPV>0 при 12% -> IRR>12%"}, {"q": "Инвестиция 50M, CF=50M/год, 1 год. Payback?", "options": ["0.5 года", "1 год", "2 года", "Мгновенно"], "correct": 1, "explanation": "50/50=1 год"}]}, {"id": "unit", "title": "8. Unit Economics", "theory_blocks": [{"type": "formula", "text": "CAC = Sales & Marketing / New Customers"}, {"type": "formula", "text": "LTV = ARPU * Margin * Lifetime"}, {"type": "formula", "text": "Lifetime = 1 / (1 - Retention) = 1 / Churn"}, {"type": "title", "text": "Retention -> Lifetime (запомни!)"}, {"type": "list", "items": ["Retention 50% -> 2 года", "Retention 60% -> 2.5 года", "Retention 75% -> 4 года", "Retention 80% -> 5 лет", "Retention 90% -> 10 лет"]}, {"type": "hint", "text": "LTV:CAC > 3:1 -- здоровый бизнес. В embedded finance CAC ~ 0!"}, {"type": "title", "text": "Пример Avito BNPL"}, {"type": "example", "text": "Комиссия 1,200/tx. Частота 3/год. Retention 60%.\nГодовой доход: 1,200*3=3,600\nLifetime: 1/0.4=2.5 года\nLTV = 3,600*2.5 = 9,000 руб."}], "questions": [{"q": "ARPU=5K/год, margin=40%, retention=75%. LTV?", "options": ["8,000", "20,000", "5,000", "15,000"], "correct": 0, "explanation": "Lifetime=1/0.25=4. LTV=5K*0.4*4=8,000"}, {"q": "CAC=3K, LTV=9K. LTV:CAC? Здоров ли бизнес?", "options": ["3:1 -- на грани", "3:1 -- стандарт, ОК", "0.33 -- плохо", "9:1 -- отлично"], "correct": 1, "explanation": "9K/3K=3:1. Индустриальный стандарт."}, {"q": "Retention: 80% -> 60%. Во сколько раз упадёт LTV?", "options": ["В 2 раза", "В 1.5 раза", "На 20%", "Не изменится"], "correct": 0, "explanation": "Lifetime: 1/0.2=5 -> 1/0.4=2.5. Упал в 2 раза."}]}, {"id": "ecl", "title": "9. ECL и риск", "theory_blocks": [{"type": "formula", "text": "ECL = PD * LGD * EAD * DF"}, {"type": "list", "items": ["PD -- Probability of Default (из скоринга)", "LGD -- Loss Given Default (без залога 70-100%, авто 30-50%, недвижимость 10-30%)", "EAD -- Exposure at Default (остаток; для линии: drawn + CCF*undrawn)", "DF -- Discount Factor"]}, {"type": "title", "text": "IFRS 9 стадии"}, {"type": "list", "items": ["Stage 1: живой кредит -> ECL на 12 мес", "Stage 2: ухудшение -> ECL на весь срок", "Stage 3: дефолт (90+ дней) -> ECL на весь срок"]}, {"type": "example", "text": "Займ A: EAD 1M, PD 2%, LGD 45% -> ECL = 9,000\nЗайм B: EAD 700K, PD 4%, LGD 60% -> ECL = 16,800\nЗайм C: EAD 300K, PD 25%, LGD 70%, DF 0.92 -> ECL = 48,300"}, {"type": "formula", "text": "Cost of Risk = Provisions / Portfolio"}], "questions": [{"q": "PD=5%, LGD=80%, EAD=2M. ECL?", "options": ["80,000", "100,000", "160,000", "8,000"], "correct": 0, "explanation": "2M*0.05*0.80=80,000"}, {"q": "С залогом авто vs без залога (одинаковый PD). ECL выше у:", "options": ["С залогом", "Без залога", "Одинаково", "Зависит от суммы"], "correct": 1, "explanation": "Без залога LGD выше -> ECL выше"}, {"q": "Портфель 10 млрд, резервы 350 млн. Cost of Risk?", "options": ["3.5%", "0.35%", "35%", "2.86%"], "correct": 0, "explanation": "350M/10,000M=3.5%"}, {"q": "Кредитная линия: лимит 1M, drawn 400K, undrawn 600K, CCF=50%. EAD?", "options": ["400K", "700K", "1M", "600K"], "correct": 1, "explanation": "400K+50%*600K=700K"}]}, {"id": "funnels", "title": "10. Воронки и метрики", "theory_blocks": [{"type": "title", "text": "Каскадная конверсия"}, {"type": "text", "text": "Итого = произведение конверсий каждого шага. 100 чел * 70% * 57% * 75% = 30 чел = 30%."}, {"type": "title", "text": "DAU/MAU (Stickiness)"}, {"type": "text", "text": "DAU всегда <= MAU. Ratio = доля MAU, приходящая каждый день."}, {"type": "list", "items": ["Мессенджер: 0.5-0.7", "Банк: 0.15-0.25", "Финтех-инструмент: 0.05-0.15"]}, {"type": "title", "text": "Attach Rate"}, {"type": "text", "text": "% сделок с финпродуктом. BNPL benchmark: 15-25%."}, {"type": "title", "text": "Пример воронки автокредита"}, {"type": "example", "text": "1M просмотров -> 70% видят кнопку -> 5% кликнули\n-> 60% начали -> 70% отправили -> 35% одобрены\n-> 50% приняли -> 80% завершили = 2,058 выдач\nКонверсия: 0.2% от просмотра, 5.9% от клика"}], "questions": [{"q": "Воронка: 80%->10%->65%->45%->70%. Из 10,000 дойдут:", "options": ["164", "1,640", "16", "2,700"], "correct": 0, "explanation": "10K*0.8*0.1*0.65*0.45*0.7=164"}, {"q": "MAU=5M, DAU=400K. Stickiness?", "options": ["8%", "12.5%", "80%", "0.8%"], "correct": 0, "explanation": "400K/5M=8%"}, {"q": "Доля карт: 58%->53%. П.п. потеряли? % снизилась?", "options": ["5 п.п., -5%", "5 п.п., -8.6%", "-8.6 п.п., -5%", "53 п.п., -5%"], "correct": 1, "explanation": "П.п.: 58-53=5. Процентов: 5/58=8.6%"}, {"q": "Approval rate: 35%->50%. Выдачи выросли на:", "options": ["15%", "43%", "50%", "15 п.п."], "correct": 1, "explanation": "50/35=1.43=+43%"}]}, {"id": "dcf", "title": "11. DCF и оценка", "theory_blocks": [{"type": "formula", "text": "EV = Sum(PV(FCF)) + PV(Terminal Value)"}, {"type": "title", "text": "Terminal Value (Gordon Growth)"}, {"type": "formula", "text": "TV = FCFn * (1+g) / (WACC - g)"}, {"type": "example", "text": "FCF5=1M, g=3%, WACC=8%\nTV = 1M*1.03/(0.08-0.03) = 20.6M"}, {"type": "title", "text": "Мультипликаторы"}, {"type": "list", "items": ["P/E = Market Cap / Net Income (для прибыльных)", "EV/EBITDA (для долговых)", "P/S = Market Cap / Revenue (для убыточных)"]}, {"type": "formula", "text": "Equity Value = EV - Debt + Cash"}, {"type": "hint", "text": "WACC для финтеха: ~10-12%. Для банка: ~8-10%. Для стартапа: 15-20%."}], "questions": [{"q": "FCF5=500K, g=2%, WACC=10%. Terminal Value?", "options": ["6.25M", "6.375M", "5M", "50M"], "correct": 1, "explanation": "500K*1.02/(0.10-0.02)=510K/0.08=6.375M"}, {"q": "EBITDA=200M, мультипликатор 10x. EV?", "options": ["200M", "2,000M", "20M", "210M"], "correct": 1, "explanation": "200M*10=2,000M"}, {"q": "EV=2,000M, Cash=300M, Debt=800M. Equity Value?", "options": ["1,500M", "2,500M", "900M", "1,200M"], "correct": 0, "explanation": "EV-Debt+Cash=2,000-800+300=1,500M"}]}, {"id": "banking", "title": "12. Банковские метрики", "theory_blocks": [{"type": "formula", "text": "NIM = (Interest Income - Interest Expense) / Portfolio"}, {"type": "formula", "text": "Cost of Risk = Provisions / Portfolio"}, {"type": "formula", "text": "ROA = Operating Income / Assets"}, {"type": "title", "text": "Basel III"}, {"type": "list", "items": ["CET1 > 4.5% от RWA", "Tier 1 > 6%", "Total Capital > 8%"]}, {"type": "title", "text": "Leverage"}, {"type": "list", "items": ["Debt/EBITDA -- чем меньше тем лучше (<4x норма)", "Interest Coverage = EBIT/Interest -- чем больше тем лучше"]}, {"type": "title", "text" ", "text": "Revenue от attach rate"}, {"type": "formula", "text": "Revenue = Total Deals * Attach * Commission/tx"}, {"type": "hint", "text": "Средний чек с рассрочкой на Avito x6! Рассрочка увеличивает и GMV, и комиссию."}], "questions": [{"q": "500K сделок/мес, attach 8%, комиссия 480/tx. Доход/мес?", "options": ["19.2M", "192M", "1.92M", "240M"], "correct": 0, "explanation": "500K*8%=40K tx. 40K*480=19.2M"}, {"q": "Attach: 5%->12%. Выручка BNPL выросла на:", "options": ["+7%", "+140%", "+240%", "+7 п.п."], "correct": 1, "explanation": "12/5=2.4=+140%"}, {"q": "Расходы BNPL: 15M/мес. Комиссия 480/tx. 500K сделок/мес. Min attach для BE?", "options": ["6.25%", "3.1%", "12.5%", "1%"], "correct": 0, "explanation": "15M/480=31,250 tx. 31,250/500K=6.25%"}, {"q": "Чек без рассрочки 5K, с рассрочкой 30K (x6). Attach 10% на 1M сделок. Рост GMV?", "options": ["+50%", "+25%", "+500%", "x6"], "correct": 0, "explanation": "Без: 5 млрд. С: 900K*5K+100K*30K=7.5 млрд. +50%"}]}, {"id": "cross", "title": "17. Cross-sell LTV", "theory_blocks": [{"type": "formula", "text": "LTV_total = LTV_base + Sum(P(cross_i) * Value_i) + Float"}, {"type": "example", "text": "BNPL LTV: 9,000\n+P(автокредит)15%*15,000 = 2,250\n+P(страховка)25%*2,000 = 500\n+Float: 5K*15%*2.5yr = 1,875\nИтого: 13,625 руб."}, {"type": "hint", "text": "CAC ~ 0 в embedded -> LTV:CAC = бесконечность. Банк тратит 3-8K на привлечение."}, {"type": "title", "text": "8 из 10 юзеров рассрочки на Avito смотрят авто"}, {"type": "text", "text": "Это мощный cross-sell pipeline: товары -> авто -> недвижимость."}], "questions": [{"q": "LTV BNPL=9K. P(автокредит)=20%, комиссия 20K. LTV с cross-sell?", "options": ["9,000", "13,000", "29,000", "11,000"], "correct": 1, "explanation": "9K+0.2*20K=9K+4K=13K"}, {"q": "CAC банка=5K, LTV=9K (1.8x). Avito: CAC=0, LTV=9K. Avito эффективнее в:", "options": ["2 раза", "5 раз", "Бесконечно", "Одинаково"], "correct": 2, "explanation": "LTV/0 = бесконечность. Embedded distribution!"}, {"q": "Retention: 80%->50%. Lifetime изменился:", "options": ["5->2 года", "4->2 года", "5->2.5 года", "10->5 лет"], "correct": 0, "explanation": "1/0.2=5 -> 1/0.5=2"}, {"q": "Cashback 500/год, LTV без=9K (ret 60%). С кэшбэком ret растёт до 75%. Окупается?", "options": ["Да, LTV вырастет значительно", "Нет, кэшбэк съест прибыль", "Нужно больше данных", "Еле-еле"], "correct": 0, "explanation": "Без: 3,600*2.5=9K. С: (3,600-500)*4=12,400. Рост +3,400. Окупается!"}]}, {"id": "fermi", "title": "18. Быстрые оценки", "theory_blocks": [{"type": "title", "text": "Принцип Ферми"}, {"type": "text", "text": "Разбей на компоненты, округли, перемножь. Точность не нужна -- нужен порядок."}, {"type": "title", "text": "Пример: потенциал автокредита Avito"}, {"type": "example", "text": "Просмотров авто: ~50M/мес\nГотовы купить: 5% = 2.5M\nНужен кредит: 30% = 750K\nКонверсия воронки: 3% = 22,500 выдач/мес\nСр. кредит 800K, комиссия 2%\nRevenue = 22,500*800K*2% = 360M/мес = 4.3 млрд/год"}, {"type": "title", "text": "Правило 72"}, {"type": "formula", "text": "Удвоение за ~ 72/r лет"}, {"type": "text", "text": "При 12%: 72/12=6 лет. При 24%: 72/24=3 года."}, {"type": "hint", "text": "Россия: 146M людей, ~80M с картами. Avito: 70M MAU, ~20% покупают = 14M покупателей."}], "questions": [{"q": "Avito: 70M MAU, 20% делают сделку=14M, attach 10%, комиссия 500. Выручка BNPL/год?", "options": ["8.4 млрд", "840M", "84 млрд", "84M"], "correct": 0, "explanation": "14M*10%=1.4M tx/мес*500=700M/мес*12=8.4 млрд"}, {"q": "При ставке 18% деньги удвоятся за:", "options": ["2 года", "4 года", "6 лет", "18 лет"], "correct": 1, "explanation": "72/18=4 года"}, {"q": "Ozon Fintech: выручка 195 млрд, 42M юзеров. ARPU?", "options": ["~4,600", "~46,000", "~460", "~195"], "correct": 0, "explanation": "195,000M/42M=4,640 руб"}, {"q": "Avito хочет финтех 15 млрд/год. MAU=70M. ARPU в расчёте на 1 MAU?", "options": ["~215 руб", "~2,150", "~21,500", "~15"], "correct": 0, "explanation": "15,000M/70M=214 руб. Но если финтех-юзеров var G={
  annuity:{steps:["Переведи годовую ставку в месячную: r = annual / 12.","Определи, что ищешь: платёж PMT, сумму PV или сравнение переплаты.","Если сравниваешь схемы платежей, смотри на скорость гашения тела долга."],worked:"Задача-шаблон: займ 900K, 12% годовых, 12 месяцев. Сначала r = 1% в месяц. Затем считаешь множитель и умножаешь его на сумму займа. Если дают AF, обратная задача ещё проще: PV = PMT * AF.",trap:"Частая ошибка: подставить 12% вместо 1% в месяц или забыть, что дифференцированный платёж уменьшает переплату за счёт более быстрого погашения тела."},
  irr:{steps:["Смотри на реальные денежные потоки, а не на номинальную ставку.","Комиссии в начале и ранние возвраты денег всегда толкают IRR вверх.","Если даны две точки NPV, используй линейную интерполяцию между ними."],worked:"Задача-шаблон: выдали 100K, клиент вернул 6 равных платежей на 118K суммарно. Номинально переплата кажется 18%, но деньги возвращаются частями, поэтому реальная доходность сильно выше. Для грубой оценки ищи ставку, при которой NPV потоков близка к нулю.",trap:"Ошибка новичка: сравнивать IRR с простой переплатой или с годовой номинальной ставкой без учёта тайминга платежей."},
  pv:{steps:["Определи тип потока: разовый, аннуитетный, бесконечный или растущий.","Для перпетуитета дели CF на r, для растущего перпетуитета дели на r - g.","Проверяй здравый смысл: чем ниже ставка дисконтирования, тем выше PV."],worked:"Задача-шаблон: поток 1M в год бесконечно при r = 20%. Тогда PV = 1M / 0.20 = 5M. Если поток растёт на 5%, то denominator уже 15%, и стоимость растёт до 6.67M.",trap:"Главная ловушка: забыть, что g должно быть меньше r, иначе формула растущего перпетуитета не работает."},
  pricing:{steps:["Разложи ставку на компоненты: фондирование, потери, операционные расходы и целевую маржу.","Ожидаемые потери считай как PD * LGD.","Если есть комиссия при выдаче, отдельно посмотри, сколько денег реально получил клиент."],worked:"Задача-шаблон: COF 8%, PD 4%, LGD 50%, OpEx 1%, target 2%. EL = 2%, итоговая минимальная ставка = 13%. Потом уже сравнивай с оффером и решай, покрывает ли он риск.",trap:"Часто забывают включить EL или путают ставку по договору с эффективной стоимостью для клиента после удержанной комиссии."},
  ear:{steps:["Возьми номинальную ставку r и число капитализаций m.","Посчитай EAR = (1 + r/m)^m - 1.","Для коротких периодов сначала найди доходность за период, потом аннуализируй."],worked:"Задача-шаблон: 24% годовых с ежемесячной капитализацией. Месячная ставка 2%, дальше (1.02)^12 - 1. Ответ всегда выше 24%, потому что проценты капитализируются.",trap:"Нельзя просто сказать, что effective rate равна номинальной. Это верно только без промежуточной капитализации."},
  funding:{steps:["Смотри не на формальный срок, а на средний фактический остаток денег.","Для револьвера учитывай и проценты на drawn, и fee на undrawn.","Потом дели общий доход/стоимость на реально использованный объём."],worked:"Задача-шаблон: лимит 200, использовано 50, неиспользовано 150. Interest 5% даёт 2.5, fee 2% даёт ещё 3. Итого 5.5 на 50 использования, значит эффективная ставка 11%.",trap:"Типичный промах: делить доход на весь лимит вместо drawn amount и занижать реальную стоимость."},
  npv:{steps:["Год 0 записывай со знаком минус и без дисконтирования.","Будущие потоки переводи в PV через AF или поштучное дисконтирование.","После NPV быстро считай break-even и safety margin как проверку решения."],worked:"Задача-шаблон: инвестиция 100M, AF = 3.6, ежегодный CF = 30M. PV потоков = 108M, NPV = +8M. Если NPV положительный, проект создаёт стоимость и IRR выше ставки дисконтирования.",trap:"Часто дисконтируют initial investment или забывают поставить минус перед вложением."},
  unit:{steps:["Сначала найди lifetime через retention или churn.","Потом посчитай годовую экономику на клиента: ARPU * margin.","Умножь на lifetime и сравни с CAC."],worked:"Задача-шаблон: ARPU 5K, margin 40%, retention 75%. Lifetime = 1 / 0.25 = 4 года, значит LTV = 5K * 0.4 * 4 = 8K.",trap:"Retention 75% не значит lifetime 1.33 года. Нужно делить на churn, то есть на 25%."},
  ecl:{steps:["Разложи риск на PD, LGD, EAD и при необходимости discount factor.","Для кредитных линий EAD включает часть неиспользованного лимита через CCF.","После расчёта сравни, какой параметр сильнее всего двигает ECL."],worked:"Задача-шаблон: EAD 2M, PD 5%, LGD 80%. Потери = 2,000,000 * 0.05 * 0.80 = 80,000. Если появляется залог, обычно падает LGD и весь ECL снижается.",trap:"Ошибка: сравнивать только PD и забывать, что высокий LGD или большой EAD могут сделать сделку хуже."},
  funnels:{steps:["Перемножай конверсии шаг за шагом, не складывай их.","Проверяй, что относительное изменение и изменение в п.п. не перепутаны.","Если считаешь stickiness, дели DAU на MAU."],worked:"Задача-шаблон: из 10,000 пользователей проходят 80%, потом 10%, потом 65%, 45% и 70%. Просто умножаешь все коэффициенты на 10,000 и получаешь итоговый хвост воронки.",trap:"Самая частая ошибка: сказать, что 35% -> 50% это рост на 15%. На самом деле это +15 п.п. и +43% относительно базы."},
  dcf:{steps:["Отдельно оцени явный прогнозный период и terminal value.","Для terminal value используй последнюю нормализованную FCF и формулу Гордона.","В конце переходи от EV к Equity Value через долг и кэш."],worked:"Задача-шаблон: FCF5 = 500K, g = 2%, WACC = 10%. Сначала TV = 500K * 1.02 / (0.10 - 0.02) = 6.375M, потом при необходимости дисконтируешь его назад к сегодняшнему дню.",trap:"Ошибка: брать WACC - g в процентах как 8 вместо 0.08 или забывать вычесть debt при переходе к equity."},
  banking:{steps:["Запомни базовые отношения: NIM, CoR, ROA, coverage, leverage.","Сначала приведи числитель и знаменатель к одной базе и одному периоду.","Только потом интерпретируй: больше или меньше нормы."],worked:"Задача-шаблон: процентный доход 50M, расход 35M, портфель 500M. Чистый процентный доход 15M, NIM = 15 / 500 = 3%. Дальше уже оцениваешь, хорошо это для конкретного банка или нет.",trap:"Часто путают абсолютные суммы и коэффициенты: 15M чистого дохода не равны 15% NIM без деления на портфель."},
  mental:{steps:["Сначала оцени порядок величины, затем уточняй.","Для роста в процентах дели прирост на исходную базу.","Для п.п. считай абсолютную разницу без деления."],worked:"Задача-шаблон: выручка 29 -> 104. Прирост 75, делишь на 29 и получаешь примерно 2.59, то есть +259%. Если нужно быстро, округляешь 75/30 до 2.5 и понимаешь, что ответ около +250%.",trap:"Нельзя путать x2 с +2%. Рост в 2 раза означает +100%."},
  ofp:{steps:["Разложи P&L на объём, чек, take rate и долю платформы.","Расходы на платежи считай от GMV, а не от выручки.","Для эффекта миграции между рельсами считай только переведённый объём."],worked:"Задача-шаблон: 500K транзакций, чек 30K, MDR 4%, доля платформы 40%. Доход на транзакцию = 30K * 4% * 40% = 480, затем умножаешь на 500K и получаешь 240M.",trap:"Частый промах: применить процент ко всему GMV, забыв про долю revenue share или про то, что экономия относится только к мигрировавшей доле."},
  wallet:{steps:["Сначала считай остатки: users * average balance.","Потом умножай на ставку размещения, чтобы получить float income.","Отдельно считай экономию на эквайринге от migrated GMV."],worked:"Задача-шаблон: 5M кошельков по 2K. Это 10B остатков. При ставке 15% float даёт 1.5B в год. Если доля кошелька растёт, дополнительную выгоду добавляет экономия на card acquiring.",trap:"Не путай снижение ключевой в п.п. со снижением доходности в процентах. 17% -> 8% это не -9%, а около -53%."},
  attach:{steps:["Считай attach как долю сделок с продуктом, а не долю пользователей.","Выручка = сделки * attach * комиссия на сделку.","Для break-even сначала найди нужное число транзакций, потом переведи его в attach."],worked:"Задача-шаблон: 500K сделок, attach 8%, комиссия 480. Это 40K транзакций финпродукта и 19.2M выручки в месяц. Если attach вырастет с 5% до 12%, смотри относительный рост через 12/5.",trap:"Ошибка: говорить, что 5% -> 12% это рост на 7%. В продуктовой аналитике это +7 п.п. и +140%."},
  cross:{steps:["Возьми базовый LTV и добавь ожидаемую ценность каждого cross-sell канала.","Ожидаемая ценность считается как вероятность * value.","Если retention меняется, сначала пересчитай lifetime, потом весь LTV."],worked:"Задача-шаблон: базовый LTV 9K, вероятность автокредита 20%, комиссия 20K. Добавка = 4K, значит новый LTV = 13K ещё до учёта других кросс-селлов.",trap:"Нельзя прибавлять весь value к LTV. Прибавляется только ожидаемая часть, то есть probability-weighted contribution."},
  fermi:{steps:["Разбей задачу на 3-5 драйверов: база, конверсия, чек, take rate, частота.","Грубо округляй, но не теряй порядок величины.","В конце обязательно сделай sanity check: не получился ли абсурдно большой или маленький ответ."],worked:"Задача-шаблон: 70M MAU, 20% совершают сделку, attach 10%, комиссия 500. Получаешь 14M покупателей, 1.4M финтех-сделок в месяц, 700M выручки в месяц и 8.4B в год.",trap:"Главная ошибка: пытаться считать слишком точно. В Fermi важнее правильная структура расчёта, чем второй знак после запятой."}
};

/* === GX: 4-part framework (Интуиция / Техника / Связь / Ловушка) merged into G === */
var GX={
annuity:{intuition:"Аннуитет — это «размазать тело долга + проценты на равные платежи». Каждый платёж = часть тела + проценты на текущий остаток; со временем доля процентов падает, доля тела растёт.",technique:"Якорь: 12% годовых = ровно 1%/мес, остальное масштабируй от него. Если дали AF — обратная задача тривиальна: PV = PMT × AF, а PMT = PV / AF.",connection:"AF (annuity factor) — это PV-фактор потока из n платежей: тот же AF работает в NPV (CF×AF) и в обратном аннуитете. Перпетуитет — это аннуитет при n→∞, где AF → 1/r.",trap:"Подставить 12% вместо 1%/мес. И запомни: дифференцированный платёж даёт МЕНЬШЕ переплаты (тело гасится быстрее → меньше процентов), но первые платежи выше."},
irr:{intuition:"IRR — это ставка, при которой проект выходит «в ноль» с учётом времени: NPV всех потоков = 0. Это настоящая годовая доходность с поправкой на то, КОГДА приходят деньги, а не только сколько всего.",technique:"Не считай в лоб — оцени направление: комиссия вперёд (получил меньше) и ранний возврат тела всегда ТОЛКАЮТ IRR вверх. Две точки NPV → интерполяция: IRR = r₁ + (r₂−r₁)·NPV₁/(NPV₁−NPV₂).",connection:"IRR — обратная сторона NPV: NPV>0 при ставке r ⟺ IRR>r. XIRR = тот же IRR, но с реальными датами. Чем чаще и раньше платежи, тем выше IRR относительно номинала.",trap:"Сравнивать IRR с простой переплатой или номинальной ставкой без учёта тайминга. Короткий срок раздувает годовую IRR в разы."},
pv:{intuition:"PV отвечает на вопрос «сколько эти будущие деньги стоят сегодня». Перпетуитет: вложи капитал под ставку r — и проценты вечно дают поток CF, поэтому капитал = CF/r.",technique:"Дели поток на ставку как на долю. Якоря множителя: r=10%→×10, 20%→×5, 5%→×20, 15%→×6.7. Растущий поток: дели на (r−g) — сначала вычти g, потом дели.",connection:"Это корень всей дисконт-математики. Аннуитет = конечный перпетуитет (CF×AF). NPV = PV потоков минус инвестиция. Terminal value в DCF = растущий перпетуитет. Снизил ставку вдвое → PV удвоился (обратная пропорция).",trap:"Умножить вместо деления — PV перпетуитета всегда в РАЗЫ больше годового CF. В формуле Гордона забыть, что нужно g<r."},
pricing:{intuition:"Ставка по кредиту собирается как «себестоимость + наценка»: сколько деньги стоят банку + сколько съедят дефолты + операционка + прибыль.",technique:"Минимальная ставка = COF + PD×LGD + OpEx + маржа. Риск входит ТОЛЬКО произведением PD×LGD (ожидаемые потери), не голым PD. Комиссия удержана вперёд → клиент получил меньше → эффективная ставка выше.",connection:"PD×LGD здесь — та же ожидаемая потеря, что в ECL (×EAD). COF растёт за ключевой ставкой (см. фондирование). Заложенная маржа сверху — это то, что в итоге становится NIM банка.",trap:"Забыть EL или взять голый PD без LGD. Спутать ставку по договору с эффективной стоимостью для клиента после удержанной комиссии."},
ear:{intuition:"Капитализация — это «проценты на проценты». Чем чаще их начисляют, тем выше реальная (эффективная) ставка по сравнению с номинальной.",technique:"EAR = (1 + r/m)^m − 1, где m — число капитализаций в год. Для короткого периода: сначала доходность за период, потом в степень 365/дни. Якорь: 2%/мес → (1.02)¹² ≈ 26.8%, а не 24%.",connection:"Тот же compounding, что в правиле 72 (срок удвоения) и в росте вклада за N лет. Месячная → годовая через СТЕПЕНЬ, а не ×12.",trap:"Сказать «эффективная = номинальной» — это верно только без промежуточной капитализации. И не путай (1+r)^n с 1+r·n."},
funding:{intuition:"Реальная цена денег — это «сколько заплатил / сколько реально пользовался», а не формальная ставка. Платишь и за выбранное, и за зарезервированное.",technique:"Револьвер: (drawn×i + undrawn×fee) / drawn. Факторинг/дисконт: аннуализируй по ДНЯМ — ставка × 365/срок (не ×12, если срок ≠ 30 дней). При равномерном погашении эфф. дюрация ≈ половина срока.",connection:"Это зеркало ценообразования со стороны банка: COF — вход в формулу ставки. Аннуализация по дням — тот же приём, что в EAR и факторинге. Средний остаток связан с дюрацией.",trap:"Делить доход на весь лимит вместо drawn. Аннуализировать ×12 при сроке не в 30 дней."},
npv:{intuition:"NPV отвечает: «создаёт ли проект стоимость сверх стоимости денег?». Берём все будущие потоки в сегодняшних деньгах и вычитаем вложение. >0 — да.",technique:"NPV = CF×AF − Инвестиция. Сначала PV всех потоков одним умножением (через AF), инвестицию вычитай последним шагом. Break-even CF = Инвестиция / AF.",connection:"NPV = PV (дисконт) минус инвестиция. NPV>0 при ставке r ⟺ IRR>r. AF — тот же, что в аннуитете. Payback (без дисконта) — грубый родственник.",trap:"Дисконтировать год 0 или забыть минус перед вложением. Путать break-even CF с плановым."},
unit:{intuition:"LTV — сколько денег приносит один клиент за всё «время жизни». Главное звено — как долго он остаётся (retention).",technique:"Lifetime = 1/churn = 1/(1−retention). LTV = ARPU × маржа × lifetime: сначала lifetime, потом два умножения. Якоря: retention 80%→5 лет, 75%→4, 50%→2.",connection:"Lifetime = тот же приём «1/r», что в перпетуитете (churn играет роль ставки). LTV сравнивают с CAC (LTV:CAC) и расширяют через cross-sell. ARPU = выручка/юзер.",trap:"Retention 75% → lifetime НЕ 1.33; дели на churn (25%) → 4 года. Небольшое падение retention бьёт по LTV нелинейно."},
ecl:{intuition:"Ожидаемые потери = «вероятность беды × размер беды × сколько на кону». Это среднее, которое банк закладывает в резерв заранее.",technique:"ECL = PD × LGD × EAD — три множителя подряд, ни один не выпадает. Проценты от процентов = мало, прикинь порядок. Для линии EAD = drawn + CCF×undrawn.",connection:"PD×LGD — та же ожидаемая потеря, что входит в ценообразование. CoR = резервы/портфель — это ECL на уровне всего портфеля. Залог снижает LGD → снижает весь ECL.",trap:"Смотреть только на PD, забыв LGD и EAD. Путать масштаб (млн против млрд) в Cost of Risk."},
funnels:{intuition:"Воронка — это цепочка «доживших» долей; они ПЕРЕМНОЖАЮТСЯ, а не складываются. Каждый шаг режет базу.",technique:"Перемножай конверсии подряд, заранее прикинь порядок десятки. Stickiness = DAU/MAU. Различай п.п. (разница в лоб) и % (разница / старое значение).",connection:"Перемножение конверсий = та же логика, что цепочка процентов (множители) и attach rate (режет базу до платящих). Approval rate × база = выдачи.",trap:"Сказать «35%→50% это +15%» — это +15 п.п. И +43% относительно базы. Складывать конверсии вместо умножения."},
dcf:{intuition:"Оценка компании = сегодняшняя стоимость всех будущих свободных потоков. Большая часть стоимости часто сидит в «терминале» — жизни после прогнозного периода.",technique:"TV = FCF×(1+g)/(WACC−g) — это растущий перпетуитет. EV = EBITDA × мультипликатор. Переход к акционерам: Equity = EV − Debt + Cash.",connection:"Terminal value — прямой растущий перпетуитет (см. PV/перпетуитет). EV/EBITDA — обратная сторона множителя доходности. WACC играет роль ставки дисконта r.",trap:"Брать (WACC−g) как 8 вместо 0.08. Забыть вычесть долг при переходе EV→Equity. Путать EV и Equity Value."},
banking:{intuition:"Банковские метрики — это отношения «доход/база» или «риск/капитал». Сначала приведи к одной базе и одному периоду, потом сравнивай с нормой.",technique:"NIM = чистый %-доход / портфель. CET1 ≥ 4.5% от RWA. Interest coverage = EBIT/проценты. Debt/EBITDA > 4x — тревожно. Сначала числитель (спред), потом деление.",connection:"NIM — это маржа из ценообразования, но на уровне всего портфеля. Cost of Risk (см. ECL) вычитается из NIM, чтобы получить чистую доходность с учётом риска.",trap:"Путать абсолют (15M спреда) с коэффициентом (3% NIM) без деления на базу."},
mental:{intuition:"Устный счёт — это не про «гениальность», а про якоря и разбиение. Сначала порядок величины, потом цифры. Большое число = маленькое число × степень десятки.",technique:"1% = база/100 (дальше собирай: 10% = сдвиг запятой, 5% = половина). Рост в %: новое/старое → во сколько раз → минус 1. ±x% подряд = −x²/100. Округляй для прикидки, потом поправляй.",connection:"Эти приёмы — фундамент ВСЕГО остального: проценты в ценообразовании, рост в метриках, доли в воронках. «Во сколько раз» = мост между разами и процентами.",trap:"Путать «в 2 раза» с «+2%». Делить на новую базу вместо старой. Складывать проценты вместо перемножения множителей."},
ofp:{intuition:"Выручка платёжного продукта — это цепочка множителей: объём × чек × ставка × твоя доля. Расходы на платежи считаются от GMV, а не от выручки.",technique:"Доход = tx × чек × take rate × доля платформы — проговори все 4 звена ДО счёта. Эффект миграции между рельсами считай только по переведённому объёму × разницу ставок.",connection:"Та же цепочка множителей, что в attach rate, Fermi и take rate. Доля платформы (revenue share) — твой кусок от MDR. Экономия эквайринга — см. экономику Кошелька.",trap:"Применить процент ко всему GMV, забыв про revenue share. Считать экономию от всего объёма, а не от мигрировавшей доли."},
wallet:{intuition:"Кошелёк зарабатывает двумя способами: (1) float — проценты на остатки клиентов, (2) экономия на эквайринге, когда платежи идут «внутри», а не через карты.",technique:"Float = (юзеры × средний баланс) × ставка размещения — сначала пул остатков, потом процент. Экономия = мигрировавший GMV × разницу комиссий.",connection:"Float — это перпетуитет-подобный доход на пул (см. PV). Экономия эквайринга — частный случай P&L миграции (ОФП). Ставка размещения движется за ключевой (фондирование).",trap:"Путать снижение ключевой в п.п. со снижением float-дохода в %. 17%→8% это не −9%, а ≈ −53%."},
attach:{intuition:"Attach rate — доля СДЕЛОК (не юзеров), к которым прицепили продукт. Это первый множитель, который режет базу до «платящих» сделок.",technique:"Выручка = сделки × attach × комиссия. Break-even: нужные tx = расходы/комиссия → дели на все сделки → получаешь минимальный attach. Рост attach в разы: новое/старое.",connection:"Тот же «режущий базу» множитель, что в воронках. Цепочка множителей как в ОФП и Fermi. Рост в % — см. устный счёт.",trap:"Сказать «5%→12% это +7%» — нет: +7 п.п., но +140% относительно базы. Считать attach от юзеров, а не от сделок."},
cross:{intuition:"Cross-sell добавляет к LTV не весь доход продукта, а его ОЖИДАЕМУЮ часть: вероятность взять × ценность. Embedded-дистрибуция (CAC ≈ 0) делает экономику исключительной.",technique:"Новый LTV = base LTV + Σ(P × value). Ожидаемая добавка = вероятность × ценность. Если меняется retention — сначала пересчитай lifetime, потом весь LTV.",connection:"P×value — та же логика ожидаемого значения, что PD×LGD в риске. LTV и lifetime — см. unit-экономику. CAC=0 → LTV:CAC → ∞.",trap:"Прибавлять весь value вместо probability-weighted. Забыть пересчитать lifetime при изменении retention."},
fermi:{intuition:"Fermi-оценка — «правильная структура важнее точной цифры». Разбей задачу на 3–5 драйверов и перемножь, держа в голове порядок десятки.",technique:"Декомпозируй слева направо: база × конверсия × чек × частота × take rate. Грубо округляй, в конце ×12 для года. Sanity-check: не абсурд ли по порядку величины.",connection:"Это обобщение всех цепочек множителей (ОФП, attach, воронки). «Порядок величины сначала» — главный приём устного счёта. Правило 72 — это Fermi для удвоения.",trap:"Считать слишком точно и потерять структуру. Ошибиться на степень десятки (млн против млрд)."}
};

function renderTheory(blocks){
  return blocks.map(function(b){
    if(b.type==='title') return '<span class="tt">'+b.text+'</span>';
    if(b.type==='text') return '<p>'+b.text+'</p>';
    if(b.type==='formula') return '<div class="tf">'+b.text+'</div>';
    if(b.type==='example') return '<div class="tex">'+b.text.replace(/\n/g,'<br>')+'</div>';
    if(b.type==='hint') return '<div class="th">'+b.text+'</div>';
    if(b.type==='list') return '<ul>'+b.items.map(function(i){return '<li>'+i+'</li>'}).join('')+'</ul>';
    return '<p>'+b.text+'</p>';
  }).join('');
}

function renderGuide(g){
  if(!g)return '';
  return '<div class="guide">'
    +'<div class="gtitle">Алгоритм</div><ul>'+g.steps.map(function(s){return '<li>'+s+'</li>'}).join('')+'</ul>'
    +'<div class="gtitle">Разобранный шаблон</div><div class="tex">'+g.worked.replace(/\n/g,'<br>')+'</div>'
    +'<div class="gtrap">'+g.trap+'</div>'
    +'</div>';
}

function getSolutionSteps(section,question){
  if(question.solutionSteps && question.solutionSteps.length)return question.solutionSteps;
  var guide=G[section.id];
  var steps=[];
  if(guide && guide.steps && guide.steps.length){
    steps.push(guide.steps[0]);
  }
  if(question.explanation){
    steps.push(question.explanation);
  }
  if(guide && guide.steps && guide.steps.length>1){
    steps.push(guide.steps[1]);
  }
  return steps;
}

function fwBlock(g){
  if(!g)return '';
  var h='<div class="fw">';
  if(g.intuition)h+='<div class="fwi fw-int">\uD83E\uDDE0 <b>Интуиция:</b> '+g.intuition+'</div>';
  if(g.technique)h+='<div class="fwi fw-tec">\u26A1 <b>В уме:</b> '+g.technique+'</div>';
  if(g.connection)h+='<div class="fwi fw-con">\uD83D\uDD17 <b>Связь:</b> '+g.connection+'</div>';
  if(g.trap)h+='<div class="fwi fw-trp">\u26A0\uFE0F <b>Ловушка:</b> '+g.trap+'</div>';
  h+='</div>';
  return h;
}

  h+='<ol style="margin:8px 0 0 0;padding-left:20px;display:flex;flex-direction:column;gap:5px">';

function renderExplanation(section,question){
  var ci=question.correct,letter=String.fromCharCode(65+ci);
  var correct=question.options[ci];
  var guide=G[section.id];
  var sol=question._sol;
  var h='<div class="sol">';
  h+='<div class="sol-ans"><b>Ответ '+letter+':</b> '+gloss(correct)+'</div>';
  h+=methodBlock(section.id);
  if(sol){
    if(sol.given)h+='<div class="sol-given"><b>Дано:</b> '+gloss(sol.given)+'</div>';
    if(sol.steps&&sol.steps.length){
      h+='<ol class="sol-steps">';
      for(var i=0;i<sol.steps.length;i++){var st=sol.steps[i];
        h+='<li class="sol-step"><div class="sol-think">'+gloss(st.t)+'</div>';
        if(st.c)h+='<div class="sol-calc">'+gloss(st.c)+'</div>';
        if(st.a)h+='<div class="sol-anchor">'+gloss(st.a)+'</div>';
        h+='</li>';
      }
      h+='</ol>';
    }
    if(sol.check)h+='<div class="sol-check">'+gloss(sol.check)+'</div>';
    if(sol.traps){var tk=Object.keys(sol.traps);
      if(tk.length){
        h+='<details class="sol-traps"><summary>Почему другие варианты неверны</summary><ul>';
        for(var j=0;j<tk.length;j++){var oi=+tk[j];
          h+='<li><b>'+String.fromCharCode(65+oi)+') '+gloss(question.options[oi])+'</b> — '+gloss(sol.traps[tk[j]])+'</li>';
        }
        h+='</ul></details>';
      }
    }
  }else{
    h+='<div style="margin-top:2px"><b>Почему:</b> '+gloss(question.explanation||'')+'</div>';
    if(question.solutionSteps&&question.solutionSteps.length){
      h+='<details class="sol-traps" style="margin-top:2px"><summary style="color:#818cf8">Решение по шагам</summary><ul>'
        +question.solutionSteps.map(function(step){return '<li style="color:#c7d2fe">'+gloss(step)+'</li>';}).join('')+'</ul></details>';
    }
  }
  if(guide&&(guide.intuition||guide.technique||guide.connection||guide.trap)){
    h+='<details class="sol-deep"><summary>Углубить тему (интуиция / связи / ловушка)</summary>'+fwBlock(guide)+'</details>';
  }
  h+='</div>';
  return h;
}

function augmentQuestions(){
  for(var i=0;i<S.length;i++){
    var section=S[i];
    if(EXTRA_QUESTIONS[section.id]){
      section.questions=section.questions.concat(EXTRA_QUESTIONS[section.id]);
    }
  }
  TQ=0;
  for(var j=0;j<S.length;j++){
    TQ+=S[j].questions.length;
  }
  document.getElementById('meta').textContent=S.length+' тем · '+TQ+' задач · Avito Fintech';
}

function applyHardening(){
  for(var i=0;i<S.length;i++){
    var section=S[i];
    var patchSet=HARDENING[section.id];
    if(!patchSet)continue;
    for(var key in patchSet){
      if(!Object.prototype.hasOwnProperty.call(patchSet,key))continue;
      var idx=Number(key);
      if(!section.questions[idx])continue;
      var patch=patchSet[key];
      for(var field in patch){
        if(Object.prototype.hasOwnProperty.call(patch,field)){
          section.questions[idx][field]=patch[field];
        }
      }
    }
  }
}

function sectionStats(i){
  var total=S[i].questions.length,answered=0,correct=0;
  for(var j=0;j<total;j++){
    var k=i+'_'+j;
    if(ans[k]!==undefined){answered++;if(ans[k]===S[i].questions[j].correct)correct++;}
  }
  return {total:total,answered:answered,correct:correct};
}

function lsLoad(){try{var r=localStorage.getItem(LS_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}

function saveState(){ST.ans=ans;lsSave();}
function today(){return new Date().toISOString().slice(0,10);}
function daysBetween(a,b){if(!a||!b)return 99;return Math.round((Date.parse(b)-Date.parse(a))/864e5);}
function restoreState(){
  var d=lsLoad();
  if(d){
    ST=d;
    ST.gen=ST.gen||{};ST.m=ST.m||{};ST.journal=ST.journal||[];
    ST.streak=ST.streak||{cur:0,best:0};ST.sess=ST.sess||{lastDay:'',count:0};
    ST.sprintBest=ST.sprintBest||{};ST.sprintHist=ST.sprintHist||[];ST.activeSess=ST.activeSess||null;ST.estMode=(ST.estMode!==false);
    ans=ST.ans||{};score=0;done=0;
    for(var k in ans){
      if(!Object.prototype.hasOwnProperty.call(ans,k))continue;
      var p=k.split('_'),si=+p[0],qi=+p[1];
      if(S[si]&&S[si].questions[qi]){done++;if(ans[k]===S[si].questions[qi].correct)score++;}

}
function decayMastery(){
  var t=today();
  for(var id in ST.m){
    if(!Object.prototype.hasOwnProperty.call(ST.m,id))continue;
    var m=ST.m[id],d=daysBetween(m.last,t);

  }
}

/* ---------- helpers ---------- */
function ri(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function pk(arr){return arr[ri(0,arr.length-1)];}
function pkL(lvl,p1,p2,p3){var p=p1.slice();if(lvl>1&&p2)p=p.concat(p2);if(lvl>2&&p3)p=p.concat(p3);return pk(p);}
function shuf(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=ri(0,i),t=a[i];a[i]=a[j];a[j]=t;}return a;}
function rnd2(x){return Math.round(x*100)/100;}
function sp(n){
  var r=rnd2(n),parts=(''+r).split('.');
  parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,'\u202F');
  return parts.join('.');
}
function money(n){
  var s=n<0?'\u2212':'';n=Math.abs(n);
  if(n>=1e9)return s+sp(n/1e9)+' млрд';
  if(n>=1e6)return s+sp(n/1e6)+' млн';
  if(n>=1e4)return s+sp(n/1e3)+'K';
  return s+sp(n);
}
function W(arr,a){
  var out=[],i,j;
  for(i=0;i<arr.length;i++){
    var w=arr[i];
    if(!isFinite(w.v)||Math.abs(w.v-a)<=Math.max(Math.abs(a),1)*0.005)continue;
    var dup=false;
    for(j=0;j<out.length;j++){
      if(Math.abs(w.v-out[j].v)<=Math.max(Math.abs(w.v),1)*0.03){dup=true;break;}
    }
    if(!dup)out.push(w);
  }
  return out;
}

/* ---------- answer parsing & checking ---------- */
function parseAns(s){
  if(s==null)return null;
  s=(''+s).toLowerCase().replace(/[\s\u202F\u00A0]/g,'');
  s=s.replace(/руб\.?|₽|р\.$/g,'').replace(/лет|года?|мес\.?$/g,'');
  s=s.replace(/,/g,'.');
  var mult=1;
  if(/(млрд|bn|b)$/.test(s)){mult=1e9;s=s.replace(/(млрд|bn|b)$/,'');}
  else if(/(млн|mln|m|м)$/.test(s)){mult=1e6;s=s.replace(/(млн|mln|m|м)$/,'');}
  else if(/(тыс\.?|k|к)$/.test(s)){mult=1e3;s=s.replace(/(тыс\.?|k|к)$/,'');}
  var pct=false;
  if(/%/.test(s)){pct=true;s=s.replace(/%/g,'');}
  s=s.replace(/[xх×]$/,'');
  var v=parseFloat(s);
  if(isNaN(v))return null;
  return {v:v*mult,pct:pct};
}
function rn(x,a,tol){return Math.abs(x-a)<=Math.max(Math.abs(a)*tol,1e-9);}
function matchVal(u,v,t,tol){
  if(rn(u,v,tol))return true;
  if(t.scale&&rn(u,v*t.scale,tol))return true;
  if(t.unit==='%'&&Math.abs(u)<1&&rn(u*100,v,tol))return true;
  return false;
}
function checkAns(input,t){
  var p=parseAns(input);if(!p)return false;
  return matchVal(p.v,t.a,t,(t.tol!=null?t.tol:0.01));
}
function diagnose(input,t){
  var p=parseAns(input);if(!p)return '';
  var u=p.v,i;
  if(t.wrongs){
    for(i=0;i<t.wrongs.length;i++){
      var wt=(t.wrongs[i].tol!=null)?t.wrongs[i].tol:Math.max(t.tol||0.01,0.02);
      if(matchVal(u,t.wrongs[i].v,t,wt))return t.wrongs[i].why;
    }
  }
  var cands=[t.a];if(t.scale)cands.push(t.a*t.scale);
  for(i=0;i<cands.length;i++){
    var r=Math.abs(u)/Math.abs(cands[i]||1);
    if(r>0&&isFinite(r)){
      var k=Math.log10(r),kr=Math.round(k);
      if(kr!==0&&Math.abs(k-kr)<0.05&&Math.abs(kr)<=4)
        return 'Сбился порядок величины (в 10^'+Math.abs(kr)+' раз '+(kr>0?'больше':'меньше')+'): проверь единицы — тыс / млн / млрд.';
    }
  }
  if(matchVal(u,-t.a,t,0.02))return 'Потерян знак.';
  return 'Похоже на арифметический сбой: сам расчёт выбран верно по структуре — пройди по шагам и найди, где разъехалось.';
}
function fmtAns(t){
  var a=t.a;
  if(t.unit==='%')return sp(a)+'%';
  if(t.unit==='лет')return sp(a)+(a===1?' год':' лет');
  if(t.unit==='руб')return money(a*(t.scale||1))+(t.scale||Math.abs(a)<1e4?' руб':'');
  if(t.unit)return sp(a)+' '+t.unit;
  return sp(a);
}
