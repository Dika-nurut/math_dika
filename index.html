{id:'mrate',cat:'us',name:'Месячная ставка',sprint:1,tt:[12,10,8],hack:'Месячная = годовая/12. Якорь: 12% годовых = ровно 1%/мес, остальное масштабируй от него.',make:function(){
  var r=pk([12,18,24,30,36,48,60]);
  return {q:'Годовая ставка '+r+'%. Месячная = ?',a:r/12,unit:'%',tol:0.01,steps:[r+' / 12 = '+sp(r/12)+'%.'],
    wrongs:W([{v:r,why:'Раздели годовую на 12.'}],r/12)};
}},
{id:'r72',cat:'us',name:'Правило 72',sprint:1,tt:[15,12,10],hack:'Правило 72: срок удвоения ≈ 72/ставка. 12% → 6 лет. Работает для ставок 4–30%.',make:function(){
  var r=pk([6,8,9,12,18,24,36]);
  return {q:'Ставка '+r+'% годовых. Деньги удвоятся примерно за сколько лет?',a:72/r,unit:'лет',tol:0.06,steps:['72 / '+r+' = '+sp(72/r)+' лет.']};
}},
{id:'stick',cat:'us',name:'DAU/MAU',sprint:1,tt:[18,15,12],hack:'Stickiness = DAU/MAU: дневная аудитория как доля месячной. Всегда меньшее на большее.',make:function(){
  var mau=pk([2,4,5,6,8,10]);
  var ratio=pk([5,8,10,12,15,20,25]);
  var dau=rnd2(mau*ratio/100);
  return {q:'DAU = '+sp(dau)+' млн, MAU = '+mau+' млн. Stickiness?',a:ratio,unit:'%',tol:0.01,steps:[
    'DAU / MAU = '+sp(dau)+' / '+mau+' = '+ratio+'%.'
  ],wrongs:W([{v:rnd2(10000/ratio),why:'Перевернул: stickiness = DAU / MAU.'}],ratio)};
}},
{id:'lifetime',cat:'us',name:'Retention \u2192 Lifetime',sprint:1,tt:[18,15,12],hack:'Lifetime = 1/churn, а churn = 1 − retention. Retention 80% → churn 20% → 1/0.2 = 5 лет.',make:function(){
  var ret=pk([50,60,75,80,90,96]);
  var a=rnd2(1/(1-ret/100));
  return {q:'Retention '+ret+'%. Средний lifetime (лет)?',a:a,unit:'лет',tol:0.01,steps:[
    'Churn = 1 \u2212 '+ret+'% = '+(100-ret)+'%.',
    'Lifetime = 1 / '+(100-ret)+'% = '+sp(a)+' лет.'
  ],wrongs:W([{v:rnd2(1/(ret/100)),why:'Дели на churn (1 \u2212 retention), а не на retention.'}],a)};
}},

/* === Кредитная математика === */
{id:'perp',cat:'cr',name:'Перпетуитет',sprint:0,tt:[40,35,30],hack:'PV перпетуитета = CF/r — деление, не умножение. Sanity-check: PV в разы БОЛЬШЕ годового CF (100 при 10% = 1000).',make:function(lvl){
  var cf=pkL(lvl,[60,80,100,120,200,240,300,500],[70,110,130,180,260,420],null);
  var r=pkL(lvl,[8,10,12,15,16,20,25],[9,11,14,18],null);
  var a=rnd2(cf/(r/100));
  return {q:'Поток '+cf+' млн/год бесконечно, r = '+r+'%. PV?',a:a,unit:'млн',scale:1e6,tol:0.02,steps:[
    'PV = CF / r = '+cf+' / '+(r/100)+' = '+sp(a)+' млн.'
  ],wrongs:W([{v:rnd2(cf*r/100),why:'Умножил на ставку \u2014 для перпетуитета надо делить: CF / r.'}],a)};
}},
{id:'gperp',cat:'cr',name:'Растущий перпетуитет',sprint:0,tt:[45,40,35],hack:'Гордон: PV = CF/(r − g). Сначала вычти g из r, потом дели. Рост почти «съедает» ставку — PV резко растёт.',make:function(){
  var pair=pk([[20,5],[15,5],[18,8],[12,2],[25,10],[20,10]]);
  var r=pair[0],g=pair[1];
  var cf=pk([60,90,100,150,300]);
  var a=rnd2(cf/((r-g)/100));
  return {q:'CF\u2081 = '+cf+' млн, рост g = '+g+'%, r = '+r+'%. PV растущего перпетуитета?',a:a,unit:'млн',scale:1e6,tol:0.02,steps:[
    'PV = CF / (r \u2212 g) = '+cf+' / '+((r-g)/100)+' = '+sp(a)+' млн.'
  ],wrongs:W([{v:rnd2(cf/(r/100)),why:'Забыл вычесть g: знаменатель = r \u2212 g.'}],a)};
}},
{id:'npv',cat:'cr',name:'NPV через AF',sprint:0,tt:[50,45,40],hack:'NPV = CF × AF − инвестиция. Сначала PV всех потоков одним умножением, инвестицию вычитай последним шагом.',make:function(){
  var af=pk([3.0,3.2,3.5,3.6,3.8,4.0,4.2]);
  var cf=pk([10,20,25,30,40,50]);
  var t=pk([-12,-8,8,10,12,15,20]);
  var inv=rnd2(cf*af-t);
  var a=rnd2(cf*af-inv);
  return {q:'Инвестиция '+sp(inv)+' млн, CF = '+cf+' млн/год, AF = '+af+'. NPV?',a:a,unit:'млн',scale:1e6,tol:0.03,steps:[
    'PV потоков = '+cf+' × '+af+' = '+sp(cf*af)+' млн.',
    'NPV = '+sp(cf*af)+' \u2212 '+sp(inv)+' = '+sp(a)+' млн.'
  ],wrongs:W([{v:rnd2(cf*af),why:'Забыл вычесть инвестицию (год 0).'}],a)};
}},
{id:'becf',cat:'cr',name:'Break-even CF',sprint:0,tt:[40,35,30],hack:'Break-even CF = Инвестиция / AF. AF переводит «всего» ↔ «в год». Sanity: годовой CF всегда меньше инвестиции.',make:function(){
  var inv=pk([60,72,80,100,120,144,150]);
  var af=pk([3.0,3.2,3.6,4.0]);
  var a=rnd2(inv/af);
  return {q:'Инвестиция '+inv+' млн, AF = '+af+'. Какой годовой CF выводит проект в ноль?',a:a,unit:'млн',scale:1e6,tol:0.03,steps:[
    'CF_BE = Investment / AF = '+inv+' / '+af+' = '+sp(a)+' млн/год.'
  ],wrongs:W([{v:rnd2(inv*af),why:'Умножил вместо деления: CF_BE = Inv / AF.'}],a)};
}},
{id:'price',cat:'cr',name:'Ставка по компонентам',sprint:0,tt:[50,45,40],hack:'Минимальная ставка = COF + PD×LGD + OpEx + маржа. Риск входит только произведением PD×LGD, не голым PD.',make:function(lvl){
  var cof=pkL(lvl,[5,6,8,10,12],[7,9,11],null),pd=pk([2,3,4,5,8,10]),lgd=pk([40,50,60,80,100]),
      opex=pkL(lvl,[1,1.5,2],[1.2,1.8,2.5],null),m=pk([2,3,4]);
  var el=rnd2(pd*lgd/100);
  var a=rnd2(cof+el+opex+m);
  return {q:'COF '+cof+'%, PD '+pd+'%, LGD '+lgd+'%, OpEx '+sp(opex)+'%, target margin '+m+'%. Минимальная ставка?',a:a,unit:'%',tol:0.01,steps:[
    'EL = PD × LGD = '+pd+'% × '+lgd+'% = '+sp(el)+'%.',
    cof+' + '+sp(el)+' + '+sp(opex)+' + '+m+' = '+sp(a)+'%.'
  ],wrongs:W([{v:rnd2(cof+pd+opex+m),why:'EL = PD × LGD, а не просто PD.'}],a)};
}},
{id:'efffee',cat:'cr',name:'Эфф. ставка с комиссией',sprint:0,tt:[50,45,40],hack:'Эффективная ставка = заплатил / получил: (r + f)/(1 − f). База — реально полученные на руки деньги, они меньше 100%.',make:function(){
  var r=pk([8,10,12,15]),f=pk([2,3,4,5]);
  var a=rnd2((r+f)/(1-f/100));
  return {q:'Кредит: ставка '+r+'%, комиссия '+f+'% удержана при выдаче. Эффективная стоимость для клиента (\u2248)?',a:a,unit:'%',tol:0.01,steps:[
    'Клиент получил '+(100-f)+', а заплатил '+r+' процентов + '+f+' комиссии = '+(r+f)+'.',
    sp(r+f)+' / '+(100-f)+' = '+sp(a)+'%.'
  ],wrongs:W([{v:r+f,tol:0.004,why:'База меньше: клиент получил только '+(100-f)+'% суммы \u2014 дели на неё.'},{v:r,tol:0.004,why:'Комиссия тоже стоимость \u2014 учти её.'}],a)};
}},
{id:'ear',cat:'cr',name:'Капитализация',sprint:0,tt:[45,40,35],hack:'Капитализация = умножение на (1+m)^n, не сложение m×n. Если множитель дан в условии — просто умножай на него.',make:function(lvl){
  var P=pk([1,1.5,2,3]);
  var m=pkL(lvl,[1,1.5,2],[1.2,1.8,2.5],null),n=pkL(lvl,[12,24,36],[18,30],null);
  var K=Math.round(Math.pow(1+m/100,n)*1000)/1000;
  var a=rnd2(P*K);
  return {q:'Депозит '+sp(P)+' млн, '+sp(m)+'%/мес с капитализацией, '+n+' мес. (1+'+sp(m)+'%)^'+n+' = '+K+'. Итоговая сумма?',a:a,unit:'млн',scale:1e6,tol:0.03,steps:[
    sp(P)+' × '+K+' = '+sp(a)+' млн.'
  ]};
}},
{id:'revolver',cat:'cr',name:'Револьвер',sprint:0,tt:[55,50,45],hack:'Цена линии = (drawn×i + undrawn×fee) / drawn: платишь и за невыбранное, а делишь на реально используемое.',make:function(){
  var L=pk([100,200,300,400]);
  var d=L*pk([0.25,0.5]);
  var u=L-d;
  var i=pk([4,5,6]),f=pk([1,1.5,2]);
  var a=rnd2((d*i/100+u*f/100)/d*100);
  return {q:'Лимит '+L+', drawn '+d+', undrawn '+u+'. Interest '+i+'%, commitment fee '+sp(f)+'%. Эффективная ставка на drawn?',a:a,unit:'%',tol:0.02,steps:[
    'Платим: '+d+'×'+i+'% + '+u+'×'+sp(f)+'% = '+sp(d*i/100+u*f/100)+'.',
    'Делим на drawn '+d+': '+sp(a)+'%.'
  ],wrongs:W([
    {v:i,why:'Забыл commitment fee на undrawn.'},
    {v:rnd2((d*i/100+u*f/100)/L*100),why:'Дели на drawn (реально использованные деньги), а не на весь лимит.'}
  ],a)};
}},
{id:'factoring',cat:'cr',name:'Факторинг / дисконт',sprint:0,tt:[45,40,35],hack:'Аннуализируй по дням: ставка × 360/срок. 2% за 60 дней = ×6 = 12% годовых. Никаких ×12 при сроке ≠ 30 дней.',make:function(lvl){
  var p=pkL(lvl,[1,1.5,2,2.5,3],[1.2,1.8,2.2,2.8],null),d=pkL(lvl,[30,60,90],[45,120],null);
  var a=rnd2(p*360/d);
  return {q:'Фактор удерживает '+sp(p)+'% от аванса за '+d+' дней. Годовая ставка (простой %, 360 дней)?',a:a,unit:'%',tol:0.02,steps:[
    sp(p)+'% × 360/'+d+' = '+sp(p)+' × '+sp(360/d)+' = '+sp(a)+'% годовых.'
  ],wrongs:W([{v:p,why:'Не аннуализировал.'},{v:rnd2(p*12),why:'Аннуализируй по дням (360/'+d+'), а не ×12.'}],a)};
}},
{id:'ecl',cat:'cr',name:'ECL',sprint:0,tt:[40,35,30],hack:'ECL = EAD × PD × LGD — три множителя подряд, ни один не выпадает. Прикинь порядок: проценты от процентов = мало.',make:function(lvl){
  var ead=pkL(lvl,[500000,1000000,2000000,3000000,4000000],[750000,1500000,2500000],null);
  var pd=pkL(lvl,[2,3,5,8,10],[4,6,7,12],null),lgd=pkL(lvl,[40,50,60,80,100],[45,55,65,75],null);
  var a=ead*pd/100*lgd/100;
  return {q:'EAD '+money(ead)+', PD '+pd+'%, LGD '+lgd+'%. ECL?',a:a,unit:'руб',tol:0.01,steps:[
    money(ead)+' × '+pd+'% × '+lgd+'% = '+money(a)+'.'
  ],wrongs:W([
    {v:ead*pd/100,why:'Забыл LGD.'},
    {v:ead*lgd/100,why:'Забыл PD.'}
  ],a)};
}},
{id:'ead',cat:'cr',name:'EAD кредитной линии',sprint:0,tt:[40,35,30],hack:'EAD = drawn + CCF × undrawn. Невыбранный лимит входит в экспозицию с весом CCF, а не нулём и не целиком.',make:function(){
  var L=pk([1000,2000,4000])*1000;
  var d=L*pk([0.3,0.4,0.5]);
  var u=L-d;
  var ccf=pk([20,50,75]);
  var a=d+ccf/100*u;
  return {q:'Лимит '+money(L)+', drawn '+money(d)+', undrawn '+money(u)+', CCF '+ccf+'%. EAD?',a:a,unit:'руб',tol:0.01,steps:[
    'EAD = drawn + CCF × undrawn = '+money(d)+' + '+ccf+'% × '+money(u)+' = '+money(a)+'.'
  ],wrongs:W([
    {v:d,why:'Undrawn тоже даёт экспозицию: + CCF × undrawn.'},
    {v:L,why:'Не весь лимит: EAD = drawn + CCF × undrawn.'}
  ],a)};
}},
{id:'cor',cat:'cr',name:'Cost of Risk',sprint:0,tt:[30,25,20],hack:'CoR = резервы/портфель. Первым делом приведи к одним единицам: млн к млрд — главная ловушка тут.',make:function(){
  var a=pk([1.5,2,2.5,3,3.5,4]);
  var port=pk([5,8,10,12,20]);
  var prov=a*port*10;
  return {q:'Портфель '+port+' млрд, резервы '+sp(prov)+' млн. Cost of Risk?',a:a,unit:'%',tol:0.01,steps:[
    sp(prov)+' млн / '+sp(port*1000)+' млн = '+sp(a)+'%.'
  ]};
}},
{id:'nim',cat:'cr',name:'NIM',sprint:0,tt:[40,35,30],hack:'NIM = (процентный доход − процентный расход) / портфель. Сначала чистый спред, потом деление.',make:function(){
  var P=pk([200,400,500,800]);
  var nimv=pk([2,2.5,3,4,5]);
  var x=pk([5,6,7,8]);
  var IE=P*x/100,II=IE+P*nimv/100;
  return {q:'Процентный доход '+sp(II)+' млн, расход '+sp(IE)+' млн, портфель '+P+' млн. NIM?',a:nimv,unit:'%',tol:0.01,steps:[
    'Чистый процентный доход: '+sp(II)+' \u2212 '+sp(IE)+' = '+sp(II-IE)+' млн.',
    sp(II-IE)+' / '+P+' = '+sp(nimv)+'%.'
  ],wrongs:W([{v:rnd2(II/P*100),why:'Нужен ЧИСТЫЙ доход: сначала вычти процентный расход.'}],nimv)};
}},
{id:'payback',cat:'cr',name:'Payback',sprint:0,tt:[25,20,16],hack:'Payback = инвестиция / годовой CF. Грубая метрика без дисконта — для быстрых прикидок на интервью идеальна.',make:function(){
  var pair=pk([[60,20],[100,25],[150,50],[120,30],[80,40],[90,30],[160,40]]);
  var a=pair[0]/pair[1];
  return {q:'Инвестиция '+pair[0]+' млн, отдача '+pair[1]+' млн/год. Payback?',a:a,unit:'лет',tol:0.01,steps:[
    pair[0]+' / '+pair[1]+' = '+sp(a)+' лет (без дисконтирования).'
  ]};
}},

/* === Продукт и метрики === */
{id:'ltv',cat:'pm',name:'LTV',sprint:0,tt:[45,40,35],hack:'LTV = ARPU × маржа × lifetime. Порядок: сначала lifetime = 1/(1−retention), потом два умножения.',make:function(lvl){
  var arpu=pkL(lvl,[2000,3000,3600,5000,6000,8000],[4200,5400,7200],null);
  var m=pkL(lvl,[20,25,30,40,50],[35,45],null);
  var ret=pkL(lvl,[50,60,75,80],[70,90],null);
  var life=rnd2(1/(1-ret/100));
  var a=rnd2(arpu*m/100*life);
  return {q:'ARPU '+sp(arpu)+'/год, маржа '+m+'%, retention '+ret+'%. LTV?',a:a,unit:'руб',tol:0.02,steps:[
    'Lifetime = 1/(1\u2212'+ret+'%) = '+sp(life)+' лет.',
    sp(arpu)+' × '+m+'% × '+sp(life)+' = '+money(a)+'.'
  ],wrongs:W([
    {v:rnd2(arpu*life),why:'Забыл маржу.'},
    {v:rnd2(arpu*m/100),why:'Забыл lifetime.'}
  ],a)};
}},
{id:'funnel',cat:'pm',name:'Воронка',sprint:0,tt:[40,35,30],hack:'Перемножай конверсии подряд и заранее прикинь порядок: 10⁵ × 0.7 × 0.1 × 0.5 ≈ 3.5×10³ — потом точный счёт.',make:function(lvl){
  var base=pk([10000,50000,100000,1000000]);
  var s1=pk([50,60,70,80]),s2=pk([5,10,20,25]),s3=pk([40,50,60,70]);
  var s4=lvl>2?pk([50,60,80]):100;
  var a=base*s1/100*s2/100*s3/100*s4/100;
  var chainTxt=s1+'% \u2192 '+s2+'% \u2192 '+s3+'%'+(s4<100?' \u2192 '+s4+'%':'');
  return {q:'Воронка из '+sp(base)+': '+chainTxt+'. Сколько дойдут до конца?',a:a,unit:'',tol:0.01,steps:[
    sp(base)+' × '+s1+'% = '+sp(base*s1/100)+', далее × '+s2+'% = '+sp(base*s1/100*s2/100)+'.',
    '× '+s3+'%'+(s4<100?' × '+s4+'%':'')+' = '+sp(a)+'.'
  ],wrongs:W([
    {v:base*s1/100*s2/100*(s4<100?s3/100:1),why:'Пропущен последний шаг воронки.'},
    {v:base*s2/100*s3/100*s4/100,why:'Пропущен первый шаг воронки.'}
  ],a)};
}},
{id:'takerev',cat:'pm',name:'Take rate \u2192 выручка',sprint:0,tt:[50,45,40],hack:'Выручка = tx × чек × take rate × доля платформы. Это цепочка множителей — проговори все четыре до счёта.',make:function(lvl){
  var tx=pk([100,200,300,500]);
  var check=pkL(lvl,[2,3,5,10,20,30],[4,7,12,15,25],null);
  var rate=pkL(lvl,[1,1.5,2,3,4],[2.5,3.5],null);
  var share=pkL(lvl,[40,50,100],[30,60,70],null);
  var per=check*1000*rate/100*share/100;
  var a=tx*1000*per;
  return {q:sp(tx)+'K транзакций/мес, чек '+check+'K, take rate '+sp(rate)+'%'+(share<100?', доля платформы '+share+'%':'')+'. Выручка/мес?',a:a,unit:'руб',tol:0.02,steps:[
    'На транзакцию: '+check+'K × '+sp(rate)+'%'+(share<100?' × '+share+'%':'')+' = '+sp(per)+' руб.',
    sp(tx)+'K × '+sp(per)+' = '+money(a)+'/мес.'
  ],wrongs:share<100?W([{v:tx*1000*check*1000*rate/100,why:'Забыл долю платформы (revenue share).'}],a):[]};
}},
{id:'float',cat:'pm',name:'Float income',sprint:0,tt:[40,35,30],hack:'Float income = остатки × ставка. Сначала пул (юзеры × средний баланс), и только потом процент.',make:function(lvl){
  var u=pk([1,2,3,5]);
  var bal=pkL(lvl,[1,2,3,4],[1.5,2.5,3.5],null);
  var r=pkL(lvl,[10,12,15,16,20],[11,13,14,18],null);
  var pool=rnd2(u*bal);
  var a=pool*1e9*r/100;
  return {q:u+' млн кошельков, средний баланс '+sp(bal)+'K, ставка размещения '+r+'%. Float income/год?',a:a,unit:'руб',tol:0.02,steps:[
    'Остатки: '+u+' млн × '+sp(bal)+'K = '+sp(pool)+' млрд.',
    sp(pool)+' млрд × '+r+'% = '+money(a)+'/год.'
  ],wrongs:W([{v:pool*1e9,why:'Это сами остатки \u2014 доход = остатки × ставка.'}],a)};
}},
{id:'attach',cat:'pm',name:'Attach \u2192 выручка',sprint:0,tt:[45,40,35],hack:'Выручка = сделки × attach × комиссия. Attach сначала режет базу до платящих сделок.',make:function(lvl){
  var deals=pk([0.5,1,2]);
  var at=pkL(lvl,[4,5,6,8,10,12],[7,9,11],null);
  var comm=pkL(lvl,[150,300,480,500],[220,350,420,560],null);
  var ntx=deals*1e6*at/100;
  var a=ntx*comm;
  return {q:sp(deals)+' млн сделок/мес, attach '+at+'%, комиссия '+comm+' руб/сделка. Выручка/мес?',a:a,unit:'руб',tol:0.02,steps:[
    'Attach-сделки: '+sp(deals)+' млн × '+at+'% = '+money(ntx)+'.',
    '× '+comm+' = '+money(a)+'/мес.'
  ],wrongs:W([{v:deals*1e6*comm,why:'Забыл attach-долю: платит не каждая сделка.'}],a)};
}},
{id:'beattach',cat:'pm',name:'Break-even attach',sprint:0,tt:[55,50,45],hack:'BE attach: нужные tx = расходы/комиссия → дели на все сделки. Иди от денег к штукам, потом к доле.',make:function(){

function genById(id){for(var i=0;i<GEN.length;i++)if(GEN[i].id===id)return GEN[i];return null;}

/* ---------- mastery model ---------- */
function mOf(id){return ST.m[id]||{v:30,lvl:1,k:0,n:0,last:''};}
function lvlOf(id){return mOf(id).lvl||1;}
function targetTime(g,lvl){return (g.tt||[45,40,35])[Math.min(lvl,3)-1];}
function updMastery(id,ok,sec,skipped){
  var m=ST.m[id]||(ST.m[id]={v:30,lvl:1,k:0,n:0,last:''});
  var g=genById(id),tt=g?targetTime(g,m.lvl):40;
  var d;
  if(skipped)d=-12;
  else if(!ok)d=-10;
  else d=(sec<=tt)?10:(sec<=2*tt)?6:3;
  m.v=Math.max(0,Math.min(100,m.v+d));
  m.n++;m.k=(m.k||0)+1;m.last=today();
  var evt='';
  if(m.v>=85&&m.lvl<3&&m.k>=8){m.lvl++;m.v=60;m.k=0;evt='\u2B06\uFE0F Уровень повышен: «'+(g?g.name:id)+'» теперь L'+m.lvl+' \u2014 числа станут жёстче.';}
  lsSave();
  return evt;
}
function journalPush(gid,t,raw,why){
  ST.journal.unshift({d:today(),gid:gid,q:t.q,a:(t.kind==='mcq'?t.options[t.correct]:fmtAns(t)),u:raw||'\u2014',why:why||''});
  if(ST.journal.length>50)ST.journal=ST.journal.slice(0,50);
  lsSave();
}
function needScore(id){
  var m=mOf(id);
  var days=m.last?Math.min(daysBetween(m.last,today()),7):7;
  var jc=0;
  for(var i=0;i<ST.journal.length;i++)if(ST.journal[i].gid===id)jc++;
  return Math.max(1,(75-m.v)+3*days+6*Math.min(jc,5));
}

/* ---------- sampling ---------- */
var CATS=[
  {id:'all',name:'Все'},
  {id:'weak',name:'\u26A1 Слабые места'},
  {id:'err',name:'\u{1F501} Мои ошибки'},
  {id:'us',name:'Устный счёт'},
  {id:'cr',name:'Кредитная математика'},
  {id:'pm',name:'Продукт и метрики'}
];
function weightedPick(pool,ws){
  var sum=0,i;for(i=0;i<ws.length;i++)sum+=ws[i];
  var x=Math.random()*sum;
  for(i=0;i<ws.length;i++){x-=ws[i];if(x<=0)return pool[i];}
  return pool[pool.length-1];
}
function pickGen(cat){
  if(cat==='err'&&ST.journal.length){
    var ids={},i;
    for(i=0;i<ST.journal.length;i++)ids[ST.journal[i].gid]=(ids[ST.journal[i].gid]||0)+1;
    var pool=[],ws=[];
    for(var id in ids)if(Object.prototype.hasOwnProperty.call(ids,id)&&genById(id)){pool.push(genById(id));ws.push(ids[id]);}
    if(pool.length)return weightedPick(pool,ws);
  }
  var p2=GEN.filter(function(g){return cat==='all'||cat==='weak'||cat==='err'||g.cat===cat;});
  var pow=(cat==='weak')?1.6:1;
  var w2=p2.map(function(g){return Math.pow(needScore(g.id),pow);});
  return weightedPick(p2,w2);
}
function pickDue(n,catFilter,exclude){
  var pool=GEN.filter(function(g){return (!catFilter||g.cat===catFilter)&&(!exclude||exclude.indexOf(g.id)<0);});
  var scored=pool.map(function(g){return {g:g,s:needScore(g.id)*(0.7+Math.random()*0.6)};});
  scored.sort(function(a,b){return b.s-a.s;});
  return scored.slice(0,n).map(function(x){return x.g;});
}

/* ---------- shared verdict renderer ---------- */

/* ---------- TRAIN mode ---------- */
var trCat='all',trCur=null,trDone=false,sesA=0,sesC=0,trT0=0;
function estLabel(e){
  var names=['единицы (1–9)','десятки (10–99)','сотни (100–999)','тысячи','десятки тысяч','сотни тысяч','миллионы','десятки млн','сотни млн','миллиарды','десятки млрд','сотни млрд','триллионы'];
  return names[Math.max(0,Math.min(12,e))];
}
function estBuckets(t){
  if(!t||t.kind==='mcq')return null;
  var T=Math.abs(t.a*(t.scale||1));
  if(!(T>0)||!isFinite(T))return null;
  var e=Math.floor(Math.log10(T));
  if(e<0)e=0; if(e>12)e=12;
  var start=Math.max(0,e-1);
  if(e-start>3)start=e-3;
  var opts=[];
  for(var i=0;i<4;i++){var ex=start+i;if(ex>12)break;opts.push(ex);}
  return {opts:opts,correct:e};
}
function trEst(ex){
  if(trDone||!trCur||trCur.estPicked!==undefined)return;
  var b=estBuckets(trCur.t);if(!b)return;
  trCur.estPicked=ex;
  trCur.estOK=(ex===b.correct);
  renderTrain();
}
function trEstSkip(){
  if(trDone||!trCur)return;
  trCur.estPicked=-1;trCur.estOK=null;
  renderTrain();
}
function trToggleEst(){
  ST.estMode=(ST.estMode===false)?true:false;
  lsSave();
  if(trCur){trCur.estPicked=undefined;trCur.estOK=undefined;}
  renderTrain();
}
function newTask(){
  var g=pickGen(trCat);
  trCur={g:g,t:g.make(lvlOf(g.id))};
  trDone=false;trT0=Date.now();
  renderTrain();
}
function renderTrain(){
  var el=document.getElementById('train');
  var chips='';
  CATS.forEach(function(c){chips+='<button class="chip'+(c.id===trCat?' act':'')+'" onclick="trSetCat(\''+c.id+'\')">'+c.name+'</button>';});
  if(!trCur){
    el.innerHTML='<div class="stitle">\u267E\uFE0F Тренажёр: бесконечные задачи</div>'
      +'<p style="color:#94a3b8;font-size:13px;margin-bottom:14px">Случайные числа, ответ вводится руками. Каждый навык имеет уровень L1\u2013L3: держишь точность и скорость \u2014 числа становятся жёстче. Неверный ответ получает <b>диагноз</b>: какая именно ошибка допущена. Формы ввода: <span style="color:#c7d2fe">1500, 1.5K, 1.5 млн, 12%</span>.</p>'
      +'<div class="chips">'+chips+'</div>'
      +'<div style="text-align:center"><button class="btn pri" onclick="newTask()">Начать \u2192</button></div>';
    return;
  }
  var t=trCur.t,g=trCur.g,m=mOf(g.id);
  var h='<div class="chips">'+chips+'</div>';
  h+='<div style="text-align:center;margin:-2px 0 12px"><button class="chip'+((ST.estMode!==false)?' act':'')+'" onclick="trToggleEst()">\uD83C\uDFAF Прикидка порядка: '+((ST.estMode!==false)?'вкл':'выкл')+'</button></div>';
  h+='<div class="sline"><span>Сессия: '+sesA+(sesA?' \u00B7 '+Math.round(sesC/sesA*100)+'%':'')+'</span><span style="color:#818cf8">'+g.name+' \u00B7 L'+m.lvl+' \u00B7 цель \u2264'+targetTime(g,m.lvl)+'с</span></div>';
  h+='<div class="tcard">';
  h+='<div class="tq">'+gloss(t.q)+'</div>';
  if(t.kind==='mcq'){
    for(var oi=0;oi<t.options.length;oi++){
      var cls='opt';
      if(trDone){cls+=' dis';if(oi===t.correct)cls+=' ok';else if(oi===trCur.picked)cls+=' no';}
      h+='<button class="'+cls+'" onclick="trPick('+oi+')">'+String.fromCharCode(65+oi)+'. '+t.options[oi]+'</button>';
    }
  } else if(!trDone){
    var eb=(ST.estMode!==false)?estBuckets(t):null;
    if(eb && trCur.estPicked===undefined){
      h+='<div style="font-size:13px;color:#a5b4fc;margin-bottom:10px">\uD83C\uDFAF Сначала прикинь <b>порядок</b> ответа \u2014 какой он величины? <span style="color:#64748b">(на счёт не влияет, тренируем чутьё)</span></div>';
      eb.opts.forEach(function(ex){
        h+='<button class="opt" style="padding:12px 14px" onclick="trEst('+ex+')">'+estLabel(ex)+'</button>';
      });
      h+='<div style="margin-top:8px;text-align:right"><button class="btn" style="font-size:12px" onclick="trEstSkip()">Пропустить \u2192</button></div>';
    } else {
      if(eb && trCur.estPicked>=0){
        var col=trCur.estOK?'#10b981':'#f59e0b';
        var msg=trCur.estOK?'\u2705 Порядок угадан \u2014 '+estLabel(eb.correct)+'. Теперь точное число.':'\u274C Не тот порядок. Верный \u2014 <b>'+estLabel(eb.correct)+'</b>. Привычка: сначала степень десятки, потом цифры.';
        h+='<div style="font-size:12.5px;color:'+col+';margin-bottom:10px;padding:8px 10px;background:rgba(0,0,0,.2);border-radius:6px;border-left:3px solid '+col+'">'+msg+'</div>';
      }
      h+='<div class="arow"><input id="ain" class="ain" autocomplete="off" placeholder="Твой ответ'+(t.unit==='%'?' (%)':'')+'" onkeydown="if(event.key===\'Enter\')trSubmit()">'
        +'<button class="btn pri" onclick="trSubmit()">OK</button></div>'
        +'<div style="margin-top:10px;text-align:right"><button class="btn" style="font-size:12px" onclick="trGiveUp()">Не знаю \u2192</button></div>';
    }
  }
  if(trDone){
    h+=verdictHTML(t,trCur.ok,trCur.gave,trCur.why,trCur.sec,trCur.evt,trCur.g.hack||t.hack);
    h+='<div style="margin-top:14px;text-align:center"><button class="btn pri" onclick="newTask()">Дальше \u2192 <span style="opacity:.6;font-size:11px">Enter</span></button></div>';
  }
  h+='</div>';
  el.innerHTML=h;
  if(!trDone&&t.kind!=='mcq'){var inp=document.getElementById('ain');if(inp)inp.focus();}
  if(trDone){
    document.onkeydown=function(e){if(e.key==='Enter'&&MODE==='train'&&trDone){document.onkeydown=null;newTask();}};
  }
}
function trSetCat(c){trCat=c;trCur=null;renderTrain();if(MODE==='train')newTask();}
function trFinish(ok,gave,raw){
  var sec=(Date.now()-trT0)/1000;
  trDone=true;trCur.ok=ok;trCur.gave=gave;trCur.sec=sec;
  trCur.why=(!ok&&!gave&&raw&&trCur.t.kind!=='mcq')?diagnose(raw,trCur.t):'';
  sesA++;if(ok)sesC++;
  recGen(trCur.g.id,ok);
  trCur.evt=updMastery(trCur.g.id,ok,sec,gave);
  if(!ok)journalPush(trCur.g.id,trCur.t,raw,trCur.why);
  renderTrain();
}
function trSubmit(){
  if(trDone)return;
  var v=document.getElementById('ain').value;
  if(!v||!parseAns(v)){document.getElementById('ain').style.borderColor='#f59e0b';return;}
  if(document.activeElement)document.activeElement.blur();
  trFinish(checkAns(v,trCur.t),false,v);
}
function trGiveUp(){if(!trDone)trFinish(false,true,'');}
function trPick(oi){
  if(trDone)return;
  trCur.picked=oi;
  trFinish(oi===trCur.t.correct,false,trCur.t.options[oi]);
}
function recGen(id,ok){
  var s=ST.gen[id]||(ST.gen[id]={a:0,c:0});
  s.a++;if(ok)s.c++;
  lsSave();
}

function ruDays(n){var m=n%10,h=n%100;if(h>=11&&h<=14)return 'дней';if(m===1)return 'день';if(m>=2&&m<=4)return 'дня';return 'дней';}

function seFinish(ok,gave,raw){

var GKEYS=Object.keys(TERMS).sort(function(a,b){return b.length-a.length;});
function gwc(ch){return ch&&/[A-Za-zА-Яа-яЁё]/.test(ch);}
function gloss(s){
  if(!s||typeof s!=='string')return s;
  var out='',i=0,n=s.length,used={};
  while(i<n){
    var matched=null;
    for(var ki=0;ki<GKEYS.length;ki++){
      var key=GKEYS[ki];if(used[key])continue;
      var L=key.length;
      if(s.substr(i,L)===key){
        var before=i===0?'':s.charAt(i-1);
        var after=(i+L>=n)?'':s.charAt(i+L);
        var fc=key.charAt(0),lc=key.charAt(L-1);
        if((!gwc(fc)||!gwc(before))&&(!gwc(lc)||!gwc(after))){matched=key;break;}
      }
    }
    if(matched){
      var disp=s.substr(i,matched.length);
      out+='<span class="gt" onclick="event.stopPropagation();showTerm(\''+matched.replace(/'/g,'')+'\')">'+disp+'</span>';
      used[matched]=1;i+=matched.length;
    }else{out+=s.charAt(i);i++;}
  }
  return out;
}
function showTerm(k){
  var t=TERMS[k];if(!t)return;closeTerm();
  var bd=document.createElement('div');bd.className='gpop-bd';bd.id='gpop-bd';bd.onclick=closeTerm;
  var p=document.createElement('div');p.className='gpop';p.id='gpop';
  var h='<h4>'+k+'</h4>';
  if(t.full)h+='<div class="gpop-full">'+t.full+'</div>';
  if(t.one)h+='<div class="gpop-one">'+t.one+'</div>';
  if(t.f)h+='<div class="gpop-f">'+t.f+'</div>';
  h+='<button class="gpop-x" onclick="closeTerm()">Понятно</button>';
  p.innerHTML=h;document.body.appendChild(bd);document.body.appendChild(p);
}
function closeTerm(){var a=document.getElementById('gpop'),b=document.getElementById('gpop-bd');if(a)a.parentNode.removeChild(a);if(b)b.parentNode.removeChild(b);}
function attachSolutions(){
  for(var i=0;i<S.length;i++){
    var m=SOL[S[i].id];if(!m)continue;
    for(var qi=0;qi<S[i].questions.length;qi++){if(m[qi])S[i].questions[qi]._sol=m[qi];}
  }
}

function launchConfetti(){
  var el=document.getElementById('confetti');
  el.innerHTML='';
  var colors=['#6366f1','#8b5cf6','#10b981','#f59e0b','#ef4444','#3b82f6','#ec4899'];
  for(var i=0;i<60;i++){
    var d=document.createElement('div');
    d.className='cp';
    d.style.left=Math.random()*100+'%';
    d.style.background=colors[Math.floor(Math.random()*colors.length)];
    d.style.width=(6+Math.random()*8)+'px';
    d.style.height=(6+Math.random()*8)+'px';
    d.style.animationDuration=(1.5+Math.random()*2)+'s';
    d.style.animationDelay=(Math.random()*0.8)+'s';
    el.appendChild(d);
  }
  setTimeout(function(){el.innerHTML='';},4000);
}
function dismissInstall(){
  document.getElementById('installbanner').style.display='none';
  try{localStorage.setItem('ib_gone','1');}catch(e){}
}
function maybeInstallBanner(){
  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  var isStandalone=window.navigator.standalone===true;
  var gone=false;try{gone=!!localStorage.getItem('ib_gone');}catch(e){}
  if(isIOS&&!isStandalone&&!gone)document.getElementById('installbanner').style.display='flex';
}
